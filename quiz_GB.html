<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game Gempa Bumi</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>

/* =================================
   RESET
================================= */
*{
    box-sizing:border-box;
}

/* =================================
   BODY
================================= */
body{
    font-family:Fredoka,sans-serif;
    text-align:center;
    margin:0;
    overflow-x:hidden;
    min-height:100vh;
    padding:20px 16px 28px;
    color:#4a2020;
    position:relative;

    background-image:
        linear-gradient(
            180deg,
            rgba(186,226,255,.8),
            rgba(229,245,255,.9)
        ),
        url('assets/jpg/bg.jpg');

    background-size:cover;
    background-position:center;
}

/* dekorasi background */
body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    opacity:.3;

    background:
        radial-gradient(circle at 12% 18%, white 0 11px, transparent 12px),
        radial-gradient(circle at 79% 22%, white 0 10px, transparent 11px),
        radial-gradient(circle at 22% 74%, white 0 13px, transparent 14px);
}

/* efek warna bawah */
body::after{
    content:"";
    position:fixed;
    inset:auto -8% -5% -8%;
    height:260px;
    pointer-events:none;
    z-index:0;

    background:
        radial-gradient(circle at 14% 42%, rgba(239,68,68,.24), transparent 26%),
        radial-gradient(circle at 33% 60%, rgba(248,113,113,.22), transparent 28%),
        radial-gradient(circle at 52% 42%, rgba(239,68,68,.2), transparent 24%);
}

/* =================================
   HEADER
================================= */
header{
    width:min(100%,980px);
    margin:0 auto 18px;

    background:linear-gradient(135deg,#ef4444,#b91c1c);
    color:white;

    padding:18px;
    border-radius:18px;
    font-size:clamp(18px,4vw,24px);
    font-weight:bold;
}

/* =================================
   BUTTON KEMBALI
================================= */
.back-btn{
    position:fixed;
    top:18px;
    left:18px;

    padding:9px 14px;
    border-radius:999px;

    background:white;
    color:#b91c1c;

    text-decoration:none;
    font-weight:bold;
}

/* =================================
   DASHBOARD
================================= */
.dashboard{
    position:relative;
    z-index:2;

    width:min(100%,980px);
    margin:auto;

    background:rgba(255,255,255,.9);

    padding:26px 20px;
    border-radius:28px;
}

/* =================================
   KARAKTER BUMI
================================= */
.earth{
    font-size:88px;
    line-height:1;
    animation:bounce 1.1s infinite alternate;
}

@keyframes bounce{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-10px);
    }
}

/* =================================
   BUBBLE TEXT
================================= */
.bubble{
    background:white;
    padding:14px 18px;
    border-radius:20px;
    margin:16px auto;

    max-width:680px;
}

/* =================================
   TEXT
================================= */
#progress{
    margin:14px 0 6px;
}

#question{
    margin-bottom:12px;
}

#stars{
    font-size:35px;
    color:gold;
    margin:8px 0 12px;
}

/* =================================
   BUTTON
================================= */
button{
    padding:12px 18px;
    margin:8px;

    border:none;
    border-radius:12px;

    cursor:pointer;
    color:white;
    font-weight:600;

    background:linear-gradient(135deg,#ef4444,#b91c1c);
}

/* =================================
   EFEK GEMPA
================================= */
.shake{
    animation:shake .3s;
}

@keyframes shake{
    0%   {transform:translate(0,0);}
    25%  {transform:translate(3px,-3px);}
    50%  {transform:translate(-3px,3px);}
    75%  {transform:translate(3px,3px);}
    100% {transform:translate(0,0);}
}

/* =================================
   RESPONSIVE
================================= */
@media(max-width:600px){

    body{
        padding:16px 12px 24px;
    }

    .earth{
        font-size:70px;
    }

    button{
        width:90%;
        display:block;
        margin:10px auto;
    }
}

</style>
</head>

<body>

<header>Game Gempa Bumi</header>

<a href="menu_quiz.html" class="back-btn">
    ⬅ Kembali
</a>

<!-- AUDIO -->
<audio id="bgm" src="assets/mp3/backsound_quiz.mp3" loop></audio>
<audio id="benar" src="assets/mp3/benar.mp3"></audio>
<audio id="salah" src="assets/mp3/salah.mp3"></audio>

<!-- DASHBOARD -->
<div class="dashboard">

    <div class="earth" id="earth">🌎🙂</div>

    <div class="bubble" id="bubble"></div>

    <h3 id="progress"></h3>

    <h2 id="question"></h2>

    <div id="answers"></div>

    <div id="stars"></div>

    <button id="restartBtn"
            onclick="restart()"
            style="display:none;">
        🔁 Main Lagi
    </button>

    <button id="submitBtn"
            onclick="submitResult()"
            style="display:none;">
        📤 Submit Skor
    </button>

    <button id="leaderboardBtn"
            onclick="goLeaderboard()"
            style="display:none;">
        🏆 Leaderboard
    </button>

</div>

<script>

/* =================================
   DOM
================================= */
const earth = document.getElementById("earth");
const bubble = document.getElementById("bubble");
const progress = document.getElementById("progress");
const question = document.getElementById("question");
const answers = document.getElementById("answers");
const stars = document.getElementById("stars");

/* =================================
   AUDIO AUTOPLAY
================================= */
document.body.addEventListener("click",()=>{
    document.getElementById("bgm").play();
},{once:true});

/* =================================
   DATA QUIZ
================================= */
const quiz = [
    {
        q:"Gempa bumi adalah?",
        a:["Getaran bumi","Hujan deras","Angin kencang"],
        c:0
    },
    {
        q:"Saat gempa kita harus?",
        a:["Berlari panik","Berlindung di bawah meja","Tidur"],
        c:1
    },
    {
        q:"Tempat aman saat gempa?",
        a:["Dekat kaca","Di bawah meja kuat","Di tangga"],
        c:1
    },
    {
        q:"Setelah gempa kita harus?",
        a:["Masuk rumah","Ke tempat terbuka","Diam saja"],
        c:1
    },
    {
        q:"Saat gempa jangan?",
        a:["Tenang","Lari sembarangan","Panik berlebihan"],
        c:2
    }
];

/* =================================
   STATE
================================= */
let index = 0;
let score = 0;
let typingTimer;
let leaderboardSubmitted = false;

/* =================================
   EFEK KETIK
================================= */
function typeText(text){

    bubble.textContent = "";

    let i = 0;

    if(typingTimer){
        clearInterval(typingTimer);
    }

    typingTimer = setInterval(()=>{

        bubble.textContent += text.charAt(i);

        i++;

        if(i >= text.length){
            clearInterval(typingTimer);
        }

    },28);
}

/* =================================
   LOAD SOAL
================================= */
function load(){

    if(index === 0){
        typeText("Halo! Aku Bumi 🌎 Yuk belajar cara aman saat gempa!");
    }

    if(index >= quiz.length){
        finish();
        return;
    }

    progress.textContent =
        `Soal ${index+1} / ${quiz.length}`;

    question.textContent =
        quiz[index].q;

    answers.innerHTML = "";

    quiz[index].a.forEach((pilihan,i)=>{

        answers.innerHTML += `
            <button onclick="check(${i})">
                ${pilihan}
            </button>
        `;
    });
}

/* =================================
   CEK JAWABAN
================================= */
function check(answer){

    /* efek getar */
    document.body.classList.add("shake");

    setTimeout(()=>{
        document.body.classList.remove("shake");
    },300);

    /* jawaban benar */
    if(answer === quiz[index].c){

        score++;

        earth.textContent = "🌎😊";

        document.getElementById("benar").play();

    }else{

        earth.textContent = "🌎😢";

        document.getElementById("salah").play();
    }

    index++;

    setTimeout(load,600);
}

/* =================================
   HASIL AKHIR
================================= */
function finish(){

    question.textContent =
        `Skor Kamu ${score}/${quiz.length}`;

    answers.innerHTML = "";

    progress.textContent = "";

    /* hitung bintang */
    let star = 3;

    if(score < 5) star = 2;
    if(score <= 2) star = 1;

    stars.textContent = "⭐".repeat(star);

    /* pesan akhir */
    if(score === quiz.length){

        earth.textContent = "🌎😁";

        typeText(
            "Hebat! Kamu sudah paham cara aman saat gempa!"
        );

    }else{

        earth.textContent = "🌎🙂";

        typeText(
            "Bagus! Yuk belajar lagi agar lebih siap menghadapi gempa!"
        );
    }

    /* tampilkan tombol */
    restartBtn.style.display = "inline-block";
    submitBtn.style.display = "inline-block";
}

/* =================================
   RESTART GAME
================================= */
function restart(){

    index = 0;
    score = 0;

    stars.textContent = "";

    earth.textContent = "🌎🙂";

    restartBtn.style.display = "none";
    submitBtn.style.display = "none";
    leaderboardBtn.style.display = "none";

    load();
}

/* =================================
   LEADERBOARD
================================= */
function goLeaderboard(){
    window.location.href = "leaderboard.html";
}

/* =================================
   SUBMIT SCORE
================================= */
async function submitScoreToLeaderboard(){

    const raw = localStorage.getItem("app_user");

    if(!raw){
        return {
            ok:false,
            error:"Session user tidak ditemukan"
        };
    }

    if(typeof window.saveQuizScore !== "function"){
        return {
            ok:false,
            error:"Client Supabase belum siap"
        };
    }

    try{

        const user = JSON.parse(raw);

        return await window.saveQuizScore(
            user.id,
            "gempa_bumi",
            score,
            quiz.length
        );

    }catch(err){

        return {
            ok:false,
            error:"Session rusak"
        };
    }
}

/* =================================
   SUBMIT RESULT
================================= */
async function submitResult(){

    if(leaderboardSubmitted) return;

    const btn =
        document.getElementById("submitBtn");

    btn.disabled = true;
    btn.textContent = "⏳ Mengirim...";

    const result =
        await submitScoreToLeaderboard();

    if(!result.ok){

        btn.disabled = false;
        btn.textContent = "📤 Submit Skor";

        alert("Gagal : " + result.error);

        return;
    }

    leaderboardSubmitted = true;

    btn.textContent = "✅ Terkirim";

    leaderboardBtn.style.display =
        "inline-block";
}

/* =================================
   START GAME
================================= */
load();

</script>

</body>
</html>
