<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Gempa Bumi</title>

<style>

/* ================= BACKGROUND ================= */

body{
font-family:Fredoka, sans-serif;
text-align:center;
margin:0;
overflow-x:hidden;
background:linear-gradient(#f7cac9,#92a8d1);
padding:10px;
}

/* ================= HEADER ================= */

header{
background:#e76f51;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
position:relative;
z-index:2;
}

/* ================= BACK BUTTON ================= */

.back-btn{
position:absolute;
top:12px;
left:12px;
background:white;
padding:7px 12px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
color:#333;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
z-index:2;
font-size:14px;
}

/* ================= KARAKTER ================= */

.earth{
font-size:95px;
animation:bounce 1s infinite alternate;
position:relative;
z-index:2;
}

@keyframes bounce{
from{transform:translateY(0)}
to{transform:translateY(-12px)}
}

/* ================= SHAKE GEMPA ================= */

@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(3px,-3px);}
50%{transform:translate(-3px,3px);}
75%{transform:translate(3px,3px);}
100%{transform:translate(0,0);}
}

.shake{
animation:shake 0.3s;
}

/* ================= CHAT ================= */

.bubble{
background:rgba(255,255,255,.9);
padding:12px 18px;
border-radius:20px;
display:inline-block;
margin:15px;
box-shadow:0 4px 10px rgba(0,0,0,.2);
min-height:45px;
max-width:95%;
position:relative;
z-index:2;
}

/* ================= BUTTON ================= */

button{
padding:10px 18px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
background:#e76f51;
color:white;
font-weight:bold;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

.star{
font-size:35px;
color:gold;
}

h2,h3{
color:white;
}

/* ================= RESPONSIVE ================= */

@media (max-width:600px){

header{font-size:20px;}
.earth{font-size:70px;}

button{
width:90%;
max-width:280px;
display:block;
margin:10px auto;
}

}

</style>
</head>

<body>

<header>🌋 Game Gempa Bumi</header>
<a href="menu_quiz.html" class="back-btn">⬅ Kembali</a>

<audio id="bgm" src="assets/mp3/backsound_quiz.mp3" loop></audio>
<audio id="benar" src="assets/mp3/benar.mp3"></audio>
<audio id="salah" src="assets/mp3/salah.mp3"></audio>

<div class="bubble" id="bubble"></div>

<div class="earth" id="earth">🌎🙂</div>

<h3 id="progress"></h3>
<h2 id="question"></h2>

<div id="answers"></div>

<h2 id="result"></h2>

<div id="stars"></div>

<button id="restartBtn" onclick="restart()" style="display:none;">🔁 Main Lagi</button>
<button id="submitBtn" onclick="submitResult()" style="display:none;">📤 Submit Skor</button>
<button id="leaderboardBtn" onclick="goLeaderboard()" style="display:none;">🏆 Leaderboard</button>

<script>

/* ===== AUTO PLAY MUSIC ===== */
document.body.addEventListener("click",()=>{
document.getElementById("bgm").play();
},{once:true});

/* ===== DATA QUIZ GEMPA ===== */
const quiz=[
{q:"Gempa bumi adalah?",a:["Getaran bumi","Hujan deras","Angin kencang"],c:0},
{q:"Saat gempa kita harus?",a:["Berlari panik","Berlindung di bawah meja","Tidur"],c:1},
{q:"Tempat aman saat gempa?",a:["Dekat kaca","Di bawah meja kuat","Di tangga"],c:1},
{q:"Setelah gempa kita harus?",a:["Masuk rumah","Ke tempat terbuka","Diam saja"],c:1},
{q:"Saat gempa jangan?",a:["Tenang","Lari sembarangan","Panik berlebihan"],c:2}
];

let i=0;
let score=0;
let leaderboardSubmitted=false;

/* ===== TYPE TEXT ===== */
function typeText(text){
let el=document.getElementById("bubble");
el.innerHTML="";
let n=0;

let typing=setInterval(()=>{
el.innerHTML+=text.charAt(n);
n++;
if(n>=text.length) clearInterval(typing);
},30);
}

/* ===== LOAD ===== */
function load(){

if(i===0){
typeText("Halo! Aku Bumi 🌎 Yuk belajar cara aman saat gempa!");
}

if(i>=quiz.length){
finish();
return;
}

progress.innerHTML="Soal "+(i+1)+" / "+quiz.length;
question.innerHTML=quiz[i].q;

answers.innerHTML="";

quiz[i].a.forEach((p,x)=>{
answers.innerHTML+=`<button onclick="check(${x})">${p}</button>`;
});

}

/* ===== CEK ===== */
function check(x){

document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),300);

let earth=document.getElementById("earth");

if(x===quiz[i].c){
score++;
earth.innerHTML="🌎😊";
document.getElementById("benar").play();
}else{
earth.innerHTML="🌎😢";
document.getElementById("salah").play();
}

i++;
setTimeout(load,600);
}

/* ===== FINISH ===== */
function finish(){

question.innerHTML="Skor Kamu "+score+"/"+quiz.length;
answers.innerHTML="";

let star=3;
if(score<5) star=2;
if(score<=2) star=1;

stars.innerHTML="⭐".repeat(star);

document.getElementById("restartBtn").style.display="inline-block";
document.getElementById("submitBtn").style.display="inline-block";

let earth=document.getElementById("earth");

if(score===quiz.length){
earth.innerHTML="🌎😁";
typeText("Hebat! Kamu sudah paham cara aman saat gempa!");
}else{
earth.innerHTML="🌎🙂";
typeText("Bagus! Yuk belajar lagi agar lebih siap menghadapi gempa!");
}

}

/* ===== RESTART ===== */
function restart(){

i=0;
score=0;
stars.innerHTML="";
earth.innerHTML="🌎🙂";

document.getElementById("restartBtn").style.display="none";
document.getElementById("submitBtn").style.display="none";
document.getElementById("leaderboardBtn").style.display="none";

const submitBtn=document.getElementById("submitBtn");
submitBtn.textContent="📤 Submit Skor";
submitBtn.disabled=false;

leaderboardSubmitted=false;

load();

}

/* ===== LEADERBOARD ===== */

async function submitScoreToLeaderboard() {
const raw = localStorage.getItem("app_user");
if(!raw) return { ok:false, error:"Session user tidak ditemukan." };

try{
const user = JSON.parse(raw);
return await window.saveQuizScore(user.id, "gempa_bumi", score, quiz.length);
}catch(err){
return { ok:false, error:"Session rusak." };
}
}

async function submitResult(){

if(leaderboardSubmitted) return;

const btn=document.getElementById("submitBtn");
btn.disabled=true;
btn.textContent="⏳ Mengirim...";

const result = await submitScoreToLeaderboard();

if(!result.ok){
btn.disabled=false;
btn.textContent="📤 Submit Skor";
alert("Gagal: "+result.error);
return;
}

leaderboardSubmitted=true;
btn.textContent="✅ Terkirim";

document.getElementById("leaderboardBtn").style.display="inline-block";
}

function goLeaderboard(){
window.location.href="leaderboard.html";
}

load();

</script>

</body>
</html>
