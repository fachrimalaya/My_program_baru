<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <style>
    body { font-family: Arial; background: #f5f5f5; }
    .signup-box { max-width: 350px; margin: 80px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px #ccc; }
    input { width: 100%; margin-bottom: 15px; padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
    button { width: 100%; padding: 10px; border-radius: 4px; background: #43aa8b; color: #fff; border: none; }
    .error { color: red; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="signup-box">
    <h2>Sign Up</h2>
    <div id="error" class="error"></div>
    <form id="signupForm">
      <input type="text" id="name" placeholder="Nama" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" id="signupBtn">Sign Up</button>
    </form>
    <div style="margin-top:10px;text-align:center;">
      <a href="login.html">Sudah punya akun? Login</a>
    </div>
  </div>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://oojidxnmreehgkyawaaa.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vamlkeG5tcmVlaGdreWF3YWFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzQxMDEsImV4cCI6MjA4OTQxMDEwMX0.9VMLifRBhO52A6FopWg1f1-yEnUDpFwSPlvPnj1XtKM';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('signupForm');
    const errorEl = document.getElementById('error');
    const btn = document.getElementById('signupBtn');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorEl.textContent = '';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value.trim();

      if (!email || !password || !name) {
        errorEl.textContent = 'Nama, email, dan password wajib diisi.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Memproses...';

      const { data, error } = await supabase.rpc('register_user', {
        p_name: name,
        p_email: email,
        p_password: password,
      });

      if (error) {
        errorEl.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Sign Up';
        return;
      }

      const user = Array.isArray(data) ? data[0] : data;
      localStorage.setItem('app_user', JSON.stringify(user || { name, email }));

      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
