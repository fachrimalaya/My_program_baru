<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Tsunami</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{font-family:Fredoka,sans-serif;text-align:center;margin:0;overflow-x:hidden;min-height:100vh;padding:20px 16px 28px;background-image:linear-gradient(180deg, rgba(191,233,255,.8), rgba(224,242,255,.9)), url('assets/jpg/bg.jpg');background-size:cover, cover;background-position:center, center;background-repeat:no-repeat, no-repeat;background-blend-mode:soft-light;color:#173448;position:relative;}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.3;background:radial-gradient(circle at 14% 18%, rgba(255,255,255,.95) 0 11px, transparent 12px),radial-gradient(circle at 78% 22%, rgba(255,255,255,.9) 0 10px, transparent 11px),radial-gradient(circle at 20% 74%, rgba(255,255,255,.8) 0 13px, transparent 14px);} 
body::after{content:"";position:fixed;inset:auto -8% -5% -8%;height:260px;pointer-events:none;z-index:0;background:radial-gradient(circle at 14% 46%, rgba(14,165,233,.22), transparent 26%),radial-gradient(circle at 33% 60%, rgba(59,130,246,.2), transparent 28%),radial-gradient(circle at 52% 42%, rgba(34,197,94,.16), transparent 24%),radial-gradient(circle at 73% 64%, rgba(14,165,233,.22), transparent 26%),radial-gradient(circle at 88% 38%, rgba(59,130,246,.18), transparent 24%);opacity:.95;}
.wave{position:fixed;left:0;bottom:-40px;width:200%;height:220px;background:rgba(255,255,255,.32);border-radius:40%;animation:wave 6s linear infinite;pointer-events:none;z-index:0;}
@keyframes wave{from{transform:translateX(0);}to{transform:translateX(-50%);}}
header{background:linear-gradient(135deg,#1e88e5,#135fa1);color:#fff;padding:18px 16px;font-size:clamp(18px,4vw,24px);font-weight:bold;border-radius:18px;box-shadow:0 12px 28px rgba(19,95,161,.22);position:relative;z-index:2;width:min(100%,980px);margin:0 auto 18px;}
.back-btn{position:fixed;top:18px;left:18px;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);padding:9px 14px;border-radius:999px;text-decoration:none;font-weight:bold;color:#135fa1;box-shadow:0 10px 24px rgba(19,95,161,.12);border:1px solid rgba(255,255,255,.8);font-size:14px;z-index:3;}
.back-btn:hover{transform:translateY(-2px);} 
.dashboard{position:relative;z-index:2;width:min(100%,980px);margin:0 auto;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.75);border-radius:28px;box-shadow:0 18px 40px rgba(19,95,161,.14);padding:26px 20px 22px;}
.dashboard-top{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:16px;}
.earth{font-size:88px;animation:bounce 1.1s infinite alternate;line-height:1;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-10px);}}
.bubble{background:rgba(255,255,255,.92);backdrop-filter:blur(10px);padding:14px 18px;border-radius:20px;display:inline-block;margin:0 auto 16px;box-shadow:0 10px 20px rgba(19,95,161,.12);min-height:48px;max-width:min(100%,680px);border:1px solid rgba(198,228,246,.96);color:#173448;}
#progress{color:#5d7487;margin:14px 0 6px;font-size:14px;}
#question{color:#173448;margin:0 auto 12px;font-size:clamp(20px,3.2vw,28px);max-width:900px;padding:0 10px;}
#answers{position:relative;z-index:2;max-width:900px;margin:0 auto;}
#result{color:#135fa1;margin-top:16px;font-size:clamp(22px,4vw,30px);}
#stars{margin:8px 0 12px;font-size:35px;color:gold;}
button{padding:12px 18px;margin:8px;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,#1e88e5,#135fa1);color:#fff;font-weight:600;transition:.2s;box-shadow:0 10px 18px rgba(19,95,161,.12);} 
button:hover{transform:translateY(-2px);box-shadow:0 14px 22px rgba(19,95,161,.18);} 
button:disabled{opacity:.75;cursor:not-allowed;transform:none;}
@media (max-width:600px){body{padding:16px 12px 24px;}header{margin-top:38px;padding:14px 12px;}.back-btn{top:12px;left:12px;font-size:13px;padding:7px 11px;}.dashboard{padding:20px 14px 18px;border-radius:22px;}.earth{font-size:70px;}.bubble{margin:0 auto 12px;width:100%;}button{width:90%;max-width:280px;display:block;margin:10px auto;}#question{font-size:20px;padding:0 6px;}#result{font-size:22px;}#stars{font-size:30px;}}
</style>
</head>
<body>
<div class="wave"></div>
<header>Game Tsunami</header>
<a href="menu_quiz.html" class="back-btn">&#x2B05; Kembali</a>
<audio id="bgm" src="assets/mp3/backsound_quiz.mp3" loop></audio>
<audio id="benar" src="assets/mp3/benar.mp3"></audio>
<audio id="salah" src="assets/mp3/salah.mp3"></audio>
<div class="dashboard">
  <div class="dashboard-top">
    <div class="earth" id="earth">&#x1F30E;&#x1F642;</div>
    <div class="bubble" id="bubble"></div>
  </div>
  <h3 id="progress"></h3>
  <h2 id="question"></h2>
  <div id="answers"></div>
  <h2 id="result"></h2>
  <div id="stars"></div>
  <button id="restartBtn" onclick="restart()" style="display:none;">&#x1F501; Main Lagi</button>
  <button id="submitBtn" onclick="submitResult()" style="display:none;">&#x1F4E4; Submit Skor</button>
  <button id="leaderboardBtn" onclick="goLeaderboard()" style="display:none;">&#x1F3C6; Lihat Leaderboard</button>
</div>
<script>
document.body.addEventListener("click",()=>{document.getElementById("bgm").play();},{once:true});
const quiz=[{q:"Tsunami disebabkan oleh?",a:["Gempa laut","Hujan","Angin"],c:0},{q:"Air laut surut tiba-tiba berarti?",a:["Bahaya","Aman","Biasa"],c:0},{q:"Kita harus menuju?",a:["Tempat tinggi","Pantai","Laut"],c:0},{q:"Bolehkah menonton ombak?",a:["Tidak","Boleh","Wajib"],c:0},{q:"Ikuti siapa saat evakuasi?",a:["Petugas","Sendiri","Teman"],c:0}];
let i=0,score=0,leaderboardSubmitted=false,typingTimer;
async function submitScoreToLeaderboard(){const raw=localStorage.getItem("app_user");if(!raw) return {ok:false,error:"Session user tidak ditemukan. Silakan login ulang."};if(typeof window.saveQuizScore!=="function") return {ok:false,error:"Client Supabase belum siap."};try{const user=JSON.parse(raw);if(!user||!user.id) return {ok:false,error:"Data user tidak valid. Silakan login ulang."};return await window.saveQuizScore(user.id,"tsunami",score,quiz.length);}catch(err){return {ok:false,error:"Session rusak. Silakan login ulang."};}}
async function submitResult(){if(leaderboardSubmitted) return;const submitBtn=document.getElementById("submitBtn");submitBtn.disabled=true;submitBtn.textContent="\u23F3 Mengirim...";const result=await submitScoreToLeaderboard();if(!result.ok){submitBtn.disabled=false;submitBtn.textContent="\u{1F4E4} Submit Skor";alert(`Gagal submit skor: ${result.error}`);return;}leaderboardSubmitted=true;submitBtn.textContent="\u2705 Skor Terkirim";submitBtn.disabled=true;document.getElementById("leaderboardBtn").style.display="inline-block";}
function goLeaderboard(){window.location.href="leaderboard.html";}
function typeText(text){let el=document.getElementById("bubble");el.textContent="";let n=0;if(typingTimer) clearInterval(typingTimer);typingTimer=setInterval(()=>{el.textContent+=text.charAt(n);n++;if(n>=text.length){clearInterval(typingTimer);typingTimer=null;}},28);} 
function load(){if(i===0){typeText("Halo! Aku Bumi \u{1F30E} Yuk belajar tentang Tsunami!");document.getElementById("earth").textContent="\u{1F30E}\u{1F642}";}if(i>=quiz.length){finish();return;}progress.textContent="Soal "+(i+1)+" / "+quiz.length;question.textContent=quiz[i].q;answers.innerHTML="";quiz[i].a.forEach((p,x)=>{answers.innerHTML+=`<button onclick="check(${x})">${p}</button>`;});}
function check(x){if(x===quiz[i].c){score++;document.getElementById("earth").textContent="\u{1F30E}\u{1F60A}";document.getElementById("benar").play();}else{document.getElementById("earth").textContent="\u{1F30E}\u{1F622}";document.getElementById("salah").play();}i++;setTimeout(load,600);} 
function finish(){question.textContent="Skor Kamu "+score+"/"+quiz.length;answers.innerHTML="";progress.textContent="";let star=3;if(score<5) star=2;if(score<=2) star=1;stars.textContent="\u2B50".repeat(star);if(score===quiz.length){document.getElementById("earth").textContent="\u{1F30E}\u{1F601}";typeText("Hebat! Kamu tahu cara selamat dari tsunami!");}else{document.getElementById("earth").textContent="\u{1F30E}\u{1F642}";typeText("Bagus! Yuk belajar lagi agar lebih siap!");}document.getElementById("restartBtn").style.display="inline-block";document.getElementById("submitBtn").style.display="inline-block";}
function restart(){i=0;score=0;stars.textContent="";document.getElementById("earth").textContent="\u{1F30E}\u{1F642}";document.getElementById("restartBtn").style.display="none";document.getElementById("submitBtn").style.display="none";document.getElementById("leaderboardBtn").style.display="none";const submitBtn=document.getElementById("submitBtn");submitBtn.textContent="\u{1F4E4} Submit Skor";submitBtn.disabled=false;leaderboardSubmitted=false;load();}
load();
</script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL = 'https://oojidxnmreehgkyawaaa.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vamlkeG5tcmVlaGdreWF3YWFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzQxMDEsImV4cCI6MjA4OTQxMDEwMX0.9VMLifRBhO52A6FopWg1f1-yEnUDpFwSPlvPnj1XtKM';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
window.saveQuizScore = async function(userId, quizCode, scoreValue, totalValue) { const { error } = await supabase.rpc('submit_quiz_score', { p_user_id: userId, p_quiz_code: quizCode, p_score: scoreValue, p_total: totalValue, }); if (error) return { ok:false, error:error.message }; return { ok:true }; };
</script>
<script>(function checkLogin(){const raw=localStorage.getItem('app_user');if(!raw){window.location.href='login.html';}})();</script>
</body>
</html>
