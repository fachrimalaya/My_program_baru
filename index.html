<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Edukasi Bencana</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{
--sky-1:#c7e4f4;
--sky-2:#e6f3fa;
--sky-3:#d4eaf5;
--sky-4:#f6fbfe;
--sky-5:#9ac7dd;
--deep-blue:#0c4a6e;
--mid-blue:#0369a1;
}

/* ================= BODY ================= */
body{
font-family:Fredoka, sans-serif;
margin:0;
overflow-x:hidden;
min-height:100vh;

/* gradient bergerak */
background: linear-gradient(-45deg, var(--sky-1), var(--sky-2), var(--sky-3), var(--sky-4), var(--sky-5));
background-size: 420% 420%;
animation: gradientBG 14s ease infinite;

text-align:center;
}

body::before{
content:"";
position:fixed;
inset:0;
z-index:-2;
pointer-events:none;
opacity:.2;
background:repeating-linear-gradient(
120deg,
rgba(255,255,255,.5) 0 15px,
rgba(255,255,255,0) 15px 40px
);
}

@keyframes gradientBG {
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* ================= CLOUD ================= */
.cloud{
position:fixed;
background:white;
border-radius:50px;
opacity:.6;
filter:blur(2px);
z-index:0;
}

.cloud::before,
.cloud::after{
content:'';
position:absolute;
background:white;
border-radius:50%;
}

.cloud1{
width:120px; height:40px;
top:80px;
left:-150px;
animation:cloudMove 40s linear infinite;
}

.cloud1::before{
width:50px; height:50px;
top:-25px; left:20px;
}

.cloud1::after{
width:70px; height:70px;
top:-35px; right:15px;
}

.cloud2{
width:160px; height:50px;
top:200px;
left:-200px;
animation:cloudMove 55s linear infinite;
}

@keyframes cloudMove{
0%{transform:translateX(0);}
100%{transform:translateX(130vw);}
}

/* ================= PARTICLE ================= */
.particle{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:.5;
animation:floatParticle 8s linear infinite;
z-index:0;
}

@keyframes floatParticle{
0%{transform:translateY(0) scale(1);}
100%{transform:translateY(-100vh) scale(0);}
}

/* ================= HEADER ================= */
header{
background:rgba(255,255,255,.78);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,.65);
color:var(--deep-blue);
padding:22px 20px;
font-size:clamp(20px,4vw,30px);
font-weight:600;
position:relative;
z-index:2;
box-shadow:0 10px 26px rgba(3,105,161,.15);
}

.header-title{
display:block;
padding:0 170px;
}

.logout-top{
position:absolute;
top:50%;
left:20px;
transform:translateY(-50%);
display:inline-block;
padding:10px 16px;
background:linear-gradient(135deg,#ef4444,#dc2626);
color:white;
border-radius:12px;
font-size:16px;
text-decoration:none;
box-shadow:0 8px 18px rgba(220,38,38,.3);
transition:.25s;
}

.logout-top:hover{
transform:translateY(-50%) scale(1.05);
}

.profil-top{
position:absolute;
top:50%;
right:20px;
transform:translateY(-50%);
display:inline-block;
padding:10px 16px;
background:linear-gradient(135deg,#0284c7,#0369a1);
color:white;
border-radius:12px;
font-size:16px;
text-decoration:none;
box-shadow:0 8px 18px rgba(2,132,199,.28);
transition:.25s;
}

.profil-top:hover{
transform:translateY(-50%) scale(1.05);
}

/* ================= CONTAINER ================= */
.container{
max-width:1000px;
margin:34px auto;
padding:30px 22px;
position:relative;
z-index:2;
}

.card{
background:rgba(255,255,255,.82);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.7);
padding:38px 30px;
border-radius:28px;
box-shadow:0 20px 45px rgba(3,105,161,.2);
position:relative;
overflow:hidden;
}

.card::before{
content:'';
position:absolute;
width:240px;
height:240px;
border-radius:50%;
background:radial-gradient(circle,rgba(56,189,248,.22),rgba(56,189,248,0));
top:-130px;
right:-90px;
pointer-events:none;
}

.card::after{
content:'';
position:absolute;
width:200px;
height:200px;
border-radius:50%;
background:radial-gradient(circle,rgba(14,165,233,.16),rgba(14,165,233,0));
bottom:-115px;
left:-70px;
pointer-events:none;
}

/* ================= HOST ================= */

.host-wrapper{
margin-bottom:30px;
animation:fadeIn 1s ease;
position:relative;
z-index:1;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

.earth-host{
width:160px;
height:160px;
margin:auto;
border-radius:50%;
background:radial-gradient(circle at 35% 35%, #4cc9f0, #0077b6);
position:relative;
box-shadow:0 12px 25px rgba(0,0,0,.25);
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-14px);}
}

/* wajah */
.face{
position:absolute;
top:50px;
left:0;
right:0;
}

.eye{
width:18px;
height:18px;
background:white;
border-radius:50%;
position:absolute;
animation:blink 5s infinite;
}

.eye.left{ left:45px;}
.eye.right{ right:45px;}

@keyframes blink{
0%,92%,100%{transform:scaleY(1);}
95%{transform:scaleY(0.1);}
}

.mouth{
width:45px;
height:22px;
border-bottom:4px solid white;
border-radius:0 0 40px 40px;
margin:25px auto;
transition:.2s;
}

.talking{
height:12px;
background:white;
border:none;
border-radius:10px;
}

/* tangan */
.hand{
width:24px;
height:60px;
background:#4cc9f0;
position:absolute;
top:60px;
border-radius:20px;
}

.left-hand{
left:-22px;
animation:wave 2s infinite;
}

.right-hand{
right:-22px;
}

@keyframes wave{
0%{transform:rotate(0deg);}
50%{transform:rotate(-30deg);}
100%{transform:rotate(0deg);}
}

/* chat bubble */
.bubble{
background:rgba(255,255,255,.95);
padding:14px 22px;
border-radius:25px;
display:inline-block;
margin-top:15px;
box-shadow:0 10px 22px rgba(2,132,199,.18);
min-height:40px;
font-size:clamp(14px,3vw,18px);
max-width:90%;
color:var(--deep-blue);
}

/* ================= MENU ================= */

.menu{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:30px;
position:relative;
z-index:1;
}

.menu-btn{
width:220px;
padding:24px 18px;
border-radius:20px;
color:white;
font-size:19px;
font-weight:bold;
cursor:pointer;
transition:.3s;
background:linear-gradient(165deg,#0f172a,#1e293b);
border:1px solid rgba(148,163,184,.24);
border-top:4px solid transparent;
box-shadow:0 16px 28px rgba(15,23,42,.28);
text-shadow:0 1px 2px rgba(2,6,23,.45);
text-decoration:none;
display:block;
position:relative;
overflow:hidden;
letter-spacing:.2px;
}

.menu-btn::after{
content:'';
position:absolute;
width:140px;
height:140px;
background:radial-gradient(circle,rgba(255,255,255,.16),rgba(255,255,255,0));
top:-70px;
right:-55px;
pointer-events:none;
}

.menu-btn:hover{
transform:translateY(-6px) scale(1.02);
border-color:rgba(226,232,240,.38);
box-shadow:0 20px 32px rgba(15,23,42,.34);
}

/* warna tombol */
.profil{ background:linear-gradient(135deg,#fb8500,#ef6c00); }
.studi{
border-top-color:#f43f5e;
box-shadow:0 16px 28px rgba(15,23,42,.28), 0 0 0 1px rgba(244,63,94,.15) inset;
}

.belajar{
border-top-color:#0ea5e9;
box-shadow:0 16px 28px rgba(15,23,42,.28), 0 0 0 1px rgba(14,165,233,.15) inset;
}

.game{
border-top-color:#22c55e;
box-shadow:0 16px 28px rgba(15,23,42,.28), 0 0 0 1px rgba(34,197,94,.15) inset;
}

/* ================= RESPONSIVE ================= */

@media (max-width:768px){

.container{ padding:20px; }
.card{ padding:24px 18px; }

header{
padding:16px 14px;
display:grid;
grid-template-columns:auto 1fr auto;
align-items:center;
column-gap:10px;
}

.header-title{
padding:0;
font-size:clamp(16px,4vw,22px);
line-height:1.2;
}

.earth-host{
width:120px;
height:120px;
}

.eye.left{ left:30px;}
.eye.right{ right:30px;}

.menu{
flex-direction:column;
align-items:center;
}

.menu-btn{
width:90%;
font-size:18px;
padding:20px;
}

.logout-top{
position:static;
top:auto;
left:auto;
transform:none;
font-size:14px;
padding:8px 10px;
white-space:nowrap;
justify-self:start;
}

.profil-top{
position:static;
top:auto;
right:auto;
transform:none;
font-size:14px;
padding:8px 10px;
white-space:nowrap;
justify-self:end;
}

}

</style>
</head>

<body>

<!-- BACKGROUND ELEMENT -->
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<div class="particle" style="left:20%; animation-delay:0s;"></div>
<div class="particle" style="left:40%; animation-delay:2s;"></div>
<div class="particle" style="left:60%; animation-delay:4s;"></div>
<div class="particle" style="left:80%; animation-delay:1s;"></div>

<header>
<a href="login.html" class="logout-top">&#x1F6AA; Logout</a>
<span class="header-title">&#x1F30E; Media Edukasi Bencana Alam</span>
<a href="menu_profil.html" class="profil-top">&#x1F464; Profil</a>
</header>

<div class="container">
<div class="card">

<div class="host-wrapper">

<div class="earth-host">

<div class="face">
<div class="eye left"></div>
<div class="eye right"></div>
<div class="mouth" id="mouth"></div>
</div>

<div class="hand left-hand"></div>
<div class="hand right-hand"></div>

</div>

<div class="bubble" id="bubble">
Selamat datang!
</div>

</div>

<div class="menu">

<a href="belajar.html" class="menu-btn belajar">&#x1F4D8; Media Edukasi</a>
<a href="studi_kasus.html" class="menu-btn studi">&#x1F4CB; Studi Kasus</a>
<a href="menu_quiz.html" class="menu-btn game">&#x1F3AE; Game</a>

</div>

</div>
</div>

<script>

function typeText(text){

let bubble=document.getElementById("bubble");
let mouth=document.getElementById("mouth");

bubble.innerHTML="";
let i=0;

let typing=setInterval(()=>{

bubble.innerHTML+=text.charAt(i);

mouth.classList.add("talking");

setTimeout(()=>{
mouth.classList.remove("talking");
},120);

i++;

if(i>=text.length){
clearInterval(typing);
mouth.classList.remove("talking");
}

},35);
}

function getLoggedInUserName(){

let rawUser=localStorage.getItem("app_user");

if(!rawUser){
return "teman";
}

try{

let user=JSON.parse(rawUser);
let name=(user && user.name ? String(user.name).trim() : "") || (user && user.email ? String(user.email).trim() : "");

if(!name){
return "teman";
}

return name.split(" ")[0];

}catch(error){
return "teman";
}
}

window.onload=function(){

let userName=getLoggedInUserName();

typeText(
"Halo "+userName+"! \u{1F30E} Selamat datang di Media Edukasi Bencana Alam. Profil ada di kanan atas, lalu pilih menu Studi Kasus, Belajar, atau Game untuk mulai petualangan belajar kamu!"
);

};

</script>

</body>
</html>
