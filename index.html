<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Edukasi Bencana</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>

*{ box-sizing:border-box; }

/* ================= BODY ================= */
body{
font-family:Fredoka, sans-serif;
margin:0;
overflow-x:hidden;

background: linear-gradient(-45deg, #c7e4f4, #e6f3fa, #d4eaf5, #f6fbfe, #9ac7dd);
background-size: 420% 420%;
animation: gradientBG 14s ease infinite;

text-align:center;
}

body::before{
content:"";
position:fixed;
inset:0;
z-index:-2;
pointer-events:none;
opacity:.2;
background:repeating-linear-gradient(
120deg,
rgba(255,255,255,.5) 0 15px,
rgba(255,255,255,0) 15px 40px
);
}

@keyframes gradientBG {
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* ================= CLOUD ================= */
.cloud{
position:absolute;
background:white;
border-radius:50px;
opacity:.55;
filter:blur(2px);
z-index:0;
}

.cloud::before,
.cloud::after{
content:'';
position:absolute;
background:white;
border-radius:50%;
}

.cloud1{
width:120px; height:40px;
top:80px;
left:-150px;
animation:cloudMove 40s linear infinite;
}

.cloud1::before{
width:50px; height:50px;
top:-25px; left:20px;
}

.cloud1::after{
width:70px; height:70px;
top:-35px; right:15px;
}

.cloud2{
width:160px; height:50px;
top:200px;
left:-200px;
animation:cloudMove 55s linear infinite;
}

.blob{
position:fixed;
border-radius:50%;
filter:blur(2px);
pointer-events:none;
z-index:0;
opacity:.35;
}

.blob1{
width:230px;
height:230px;
left:-60px;
top:180px;
background:radial-gradient(circle, rgba(196,146,92,.26), rgba(196,146,92,0) 70%);
animation:blobFloat 10s ease-in-out infinite;
}

.blob2{
width:280px;
height:280px;
right:-70px;
bottom:70px;
background:radial-gradient(circle, rgba(94,136,154,.24), rgba(94,136,154,0) 70%);
animation:blobFloat 13s ease-in-out infinite reverse;
}

@keyframes blobFloat{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-14px);}
}

@keyframes cloudMove{
0%{transform:translateX(0);}
100%{transform:translateX(130vw);}
}

/* ================= PARTICLE ================= */
.particle{
position:absolute;
width:6px;
height:6px;
background:#ffffff;
border-radius:50%;
opacity:.4;
animation:floatParticle 8s linear infinite;
z-index:0;
}

@keyframes floatParticle{
0%{transform:translateY(0) scale(1);}
100%{transform:translateY(-100vh) scale(0);}
}

/* ================= HEADER ================= */
header{
background:linear-gradient(120deg, #2f6f8e, #1e4a63);
color:white;
padding:18px;
font-size:clamp(18px,4vw,26px);
font-weight:bold;
position:relative;
z-index:2;
box-shadow:0 10px 24px rgba(30,74,99,.24);
}

/* ================= CONTAINER ================= */
.container{
max-width:1000px;
margin:auto;
padding:26px 16px 36px;
position:relative;
z-index:2;
}

.card{
background:rgba(255,255,255,.88);
padding:26px;
border-radius:24px;
box-shadow:0 14px 32px rgba(31,75,100,.14);
border:1px solid rgba(255,255,255,.65);
backdrop-filter:blur(10px);
}

/* ================= HOST ================= */

.host-wrapper{
margin-bottom:30px;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

.earth-host{
width:160px;
height:160px;
margin:auto;
border-radius:50%;
background:radial-gradient(circle at 35% 35%, #8ec6df, #2f6f8e);
position:relative;
box-shadow:0 12px 25px rgba(0,0,0,.25);
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-14px);}
}

/* wajah */
.face{
position:absolute;
top:50px;
left:0;
right:0;
}

.eye{
width:18px;
height:18px;
background:white;
border-radius:50%;
position:absolute;
animation:blink 5s infinite;
}

.eye.left{ left:45px;}
.eye.right{ right:45px;}

@keyframes blink{
0%,92%,100%{transform:scaleY(1);}
95%{transform:scaleY(0.1);}
}

.mouth{
width:45px;
height:22px;
border-bottom:4px solid white;
border-radius:0 0 40px 40px;
margin:25px auto;
transition:.2s;
}

.talking{
height:12px;
background:white;
border:none;
border-radius:10px;
}

/* tangan */
.hand{
width:24px;
height:60px;
background:#8ec6df;
position:absolute;
top:60px;
border-radius:20px;
}

.left-hand{
left:-22px;
animation:wave 2s infinite;
}

.right-hand{
right:-22px;
}

@keyframes wave{
0%{transform:rotate(0deg);}
50%{transform:rotate(-30deg);}
100%{transform:rotate(0deg);}
}

/* chat bubble */
.bubble{
background:rgba(255,255,255,.95);
padding:14px 22px;
border-radius:24px;
display:inline-block;
margin-top:15px;
box-shadow:0 5px 12px rgba(0,0,0,.2);
min-height:40px;
font-size:clamp(14px,3vw,18px);
max-width:90%;
line-height:1.5;
}

/* ================= MENU ================= */

.menu{
display:grid;
grid-template-columns:repeat(3, minmax(180px, 1fr));
gap:16px;
margin-top:30px;
width:100%;
}

.menu-btn{
padding:18px 16px 16px;
border-radius:20px;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.3s;
box-shadow:0 10px 18px rgba(0,0,0,.16);
text-decoration:none;
display:block;
min-height:132px;
position:relative;
overflow:hidden;
box-sizing:border-box;
}

.menu-btn:hover{
transform:translateY(-7px) scale(1.03);
}

.menu-btn::after{
content:"";
position:absolute;
width:100px;
height:100px;
right:-30px;
bottom:-30px;
border-radius:50%;
background:rgba(255,255,255,.16);
}

.menu-icon{
width:52px;
height:52px;
margin:0 auto 10px;
border-radius:16px;
display:grid;
place-items:center;
font-size:28px;
background:rgba(255,255,255,.22);
box-shadow:inset 0 1px 0 rgba(255,255,255,.25);
}

.menu-title{
display:block;
font-size:20px;
line-height:1.1;
}

.menu-desc{
display:block;
margin-top:6px;
font-size:13px;
font-weight:600;
opacity:.94;
}

.logout-btn{
position:fixed;
top:14px;
left:14px;
padding:8px 14px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.94);
color:#1f2937;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.2);
z-index:5;
backdrop-filter:blur(8px);
}

.logout-btn:hover{
transform:scale(1.05);
}

.profile-btn{
position:fixed;
top:14px;
right:14px;
padding:8px 12px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.94);
color:#1f2937;
font-weight:bold;
font-size:14px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.2);
z-index:5;
backdrop-filter:blur(8px);
text-decoration:none;
display:inline-flex;
align-items:center;
gap:6px;
}

.profile-btn:hover{
transform:scale(1.05);
}

/* warna tombol */
.belajar{ background:linear-gradient(135deg, #5f97b4, #2f6f8e); }
.game{ background:linear-gradient(135deg, #5c8f85, #3f6d63); }
.kasus{ background:linear-gradient(135deg, #a55f7f, #74405a); }

/* ================= RESPONSIVE ================= */

@media (max-width:768px){

.container{ padding:16px 10px 26px; }
.card{ padding:16px 12px; }

.earth-host{
width:120px;
height:120px;
}

.eye.left{ left:30px;}
.eye.right{ right:30px;}

.menu{ grid-template-columns:1fr; }

.menu-btn{
width:100%;
font-size:17px;
padding:16px 14px 14px;
min-height:120px;
}

.menu-icon{
width:46px;
height:46px;
font-size:24px;
}

.menu-title{ font-size:18px; }

.menu-desc{ font-size:12px; }

}

</style>
</head>

<body>

<button class="logout-btn" onclick="logout()">⬅ Logout</button>
<a href="menu_profil.html" class="profile-btn">👤 Profil</a>

<!-- BACKGROUND ELEMENT -->
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="particle" style="left:20%; animation-delay:0s;"></div>
<div class="particle" style="left:40%; animation-delay:2s;"></div>
<div class="particle" style="left:60%; animation-delay:4s;"></div>
<div class="particle" style="left:80%; animation-delay:1s;"></div>

<header>🌎 Media Edukasi Bencana Alam</header>

<div class="container">
<div class="card">

<div class="host-wrapper">

<div class="earth-host">

<div class="face">
<div class="eye left"></div>
<div class="eye right"></div>
<div class="mouth" id="mouth"></div>
</div>

<div class="hand left-hand"></div>
<div class="hand right-hand"></div>

</div>

<div class="bubble" id="bubble">
Selamat datang!
</div>

</div>

<div class="menu">

<a href="studi_kasus.html" class="menu-btn kasus">
<span class="menu-icon">🎥</span>
<span class="menu-title">Studi Kasus</span>
<span class="menu-desc">Video & kejadian nyata</span>
</a>
<a href="belajar.html" class="menu-btn belajar">
<span class="menu-icon">📘</span>
<span class="menu-title">Belajar</span>
<span class="menu-desc">Materi seru</span>
</a>
<a href="menu_quiz.html" class="menu-btn game">
<span class="menu-icon">🎮</span>
<span class="menu-title">Game</span>
<span class="menu-desc">Main sambil uji ilmu</span>
</a>

</div>

</div>
</div>

<script>

function typeText(text){

let bubble=document.getElementById("bubble");
let mouth=document.getElementById("mouth");

bubble.innerHTML="";
let i=0;

let typing=setInterval(()=>{

bubble.innerHTML+=text.charAt(i);

mouth.classList.add("talking");

setTimeout(()=>{
mouth.classList.remove("talking");
},120);

i++;

if(i>=text.length){
clearInterval(typing);
mouth.classList.remove("talking");
}

},35);
}

</script>

<script>
  function logout() {
    localStorage.removeItem('app_user');
    window.location.href = 'login.html';
  }

  function showGreeting(username) {
    const text = `Halo, ${username}! 🌎 Selamat datang di Media Edukasi Bencana Alam. Pilih menu Profil, Belajar, atau Game untuk mulai petualangan belajar kamu!`;
    if (typeof window.typeText === 'function') {
      window.typeText(text);
      return;
    }
    const bubble = document.getElementById('bubble');
    if (bubble) bubble.textContent = text;
  }

  function initPage() {
    const raw = localStorage.getItem('app_user');
    if (!raw) {
      window.location.href = 'login.html';
      return;
    }

    try {
      const user = JSON.parse(raw);
      const username = user?.name && user.name.trim()
        ? user.name.trim()
        : (user?.email ? user.email.split('@')[0] : 'teman');
      showGreeting(username);
    } catch (err) {
      localStorage.removeItem('app_user');
      window.location.href = 'login.html';
    }
  }

  document.addEventListener('DOMContentLoaded', initPage);
</script>

</body>
</html>
