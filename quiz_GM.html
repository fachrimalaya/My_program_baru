<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Gunung Meletus</title>
<style>
*{box-sizing:border-box;}
:root{--bg-1:#fff2dc;--bg-2:#fffaf2;--bg-3:#ffd7bb;--primary:#f97316;--primary-dark:#c2410c;--surface:rgba(255,255,255,.92);--border:rgba(251,191,36,.22);--text:#4b2b16;--muted:#8b6a52;}
body{font-family:Fredoka,sans-serif;text-align:center;margin:0;overflow-x:hidden;min-height:100vh;padding:20px 16px 28px;background-image:linear-gradient(180deg, rgba(176,220,252,.78), rgba(220,240,255,.9)), url('assets/jpg/bg.jpg');background-size:cover, cover;background-position:center, center;background-repeat:no-repeat, no-repeat;background-blend-mode:soft-light;animation:gradientBG 16s ease infinite;color:var(--text);position:relative;}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.3;background:radial-gradient(circle at 12% 18%, rgba(255,255,255,.95) 0 11px, transparent 12px),radial-gradient(circle at 79% 22%, rgba(255,255,255,.9) 0 10px, transparent 11px),radial-gradient(circle at 22% 74%, rgba(255,255,255,.8) 0 13px, transparent 14px);}
body::after{content:"";position:fixed;inset:auto -8% -5% -8%;height:260px;pointer-events:none;z-index:0;background:radial-gradient(circle at 14% 42%, rgba(249,115,22,.24), transparent 26%),radial-gradient(circle at 33% 60%, rgba(251,146,60,.22), transparent 28%),radial-gradient(circle at 52% 42%, rgba(249,115,22,.2), transparent 24%),radial-gradient(circle at 73% 64%, rgba(245,158,11,.22), transparent 26%),radial-gradient(circle at 88% 38%, rgba(251,146,60,.18), transparent 24%);opacity:.98;}
@keyframes gradientBG{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.ash{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.18;background:radial-gradient(circle, rgba(255,255,255,.35) 2px, transparent 2px);background-size:40px 40px;animation:ash 18s linear infinite;}
@keyframes ash{from{background-position:0 0;}to{background-position:0 800px;}}
header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:18px 16px;font-size:clamp(18px,4vw,24px);font-weight:bold;border-radius:18px;box-shadow:0 12px 28px rgba(194,65,12,.18);position:relative;z-index:2;width:min(100%,980px);margin:0 auto 18px;}
.back-btn{position:fixed;top:18px;left:18px;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);padding:9px 14px;border-radius:999px;text-decoration:none;font-weight:bold;color:var(--primary-dark);box-shadow:0 10px 24px rgba(194,65,12,.12);border:1px solid rgba(255,255,255,.8);font-size:14px;z-index:3;}
.back-btn:hover{transform:translateY(-2px);}
.dashboard{position:relative;z-index:2;width:min(100%,980px);margin:0 auto;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.75);border-radius:28px;box-shadow:0 18px 40px rgba(194,65,12,.14);padding:26px 20px 22px;}
.dashboard-top{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:16px;}
.earth{font-size:88px;animation:bounce 1.1s infinite alternate;line-height:1;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-10px);}}
.bubble{background:var(--surface);backdrop-filter:blur(10px);padding:14px 18px;border-radius:20px;display:inline-block;margin:0 auto 16px;box-shadow:0 10px 20px rgba(194,65,12,.12);min-height:48px;max-width:min(100%,680px);border:1px solid var(--border);color:var(--text);}
#progress{color:var(--muted);margin:14px 0 6px;font-size:14px;}
#question{color:var(--text);margin:0 auto 12px;font-size:clamp(20px,3.2vw,28px);max-width:900px;padding:0 10px;}
#answers{position:relative;z-index:2;max-width:900px;margin:0 auto;}
#result{color:var(--primary-dark);margin-top:16px;font-size:clamp(22px,4vw,30px);}
#stars{margin:8px 0 12px;}
.star{font-size:35px;color:gold;}
button{padding:12px 18px;margin:8px;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;font-weight:600;transition:.2s;box-shadow:0 10px 18px rgba(194,65,12,.12);}
button:hover{transform:translateY(-2px);box-shadow:0 14px 22px rgba(194,65,12,.18);}
button:disabled{opacity:.75;cursor:not-allowed;transform:none;}
@media (max-width:600px){body{padding:16px 12px 24px;}header{margin-top:38px;padding:14px 12px;}.back-btn{top:12px;left:12px;font-size:13px;padding:7px 11px;}.dashboard{padding:20px 14px 18px;border-radius:22px;}.earth{font-size:70px;}.bubble{margin:0 auto 12px;width:100%;}button{width:90%;max-width:280px;display:block;margin:10px auto;}#question{font-size:20px;padding:0 6px;}#result{font-size:22px;}.star{font-size:30px;}}
</style>
</head>
<body>
<div class="ash"></div>
<header>Game Gunung Meletus</header>
<a href="menu_quiz.html" class="back-btn">⬅ Kembali</a>
<audio id="bgm" src="assets/mp3/backsound_quiz.mp3" loop></audio>
<audio id="benar" src="assets/mp3/benar.mp3"></audio>
<audio id="salah" src="assets/mp3/salah.mp3"></audio>
<div class="dashboard">
  <div class="dashboard-top">
    <div class="earth" id="earth">🌎🙂</div>
    <div class="bubble" id="bubble"></div>
  </div>
  <h3 id="progress"></h3>
  <h2 id="question"></h2>
  <div id="answers"></div>
  <h2 id="result"></h2>
  <div id="stars"></div>
  <button id="restartBtn" onclick="restart()" style="display:none;">🔁 Main Lagi</button>
  <button id="submitBtn" onclick="submitResult()" style="display:none;">📤 Submit Skor</button>
  <button id="leaderboardBtn" onclick="goLeaderboard()" style="display:none;">🏆 Lihat Leaderboard</button>
</div>
<script>
document.body.addEventListener("click",()=>{document.getElementById("bgm").play();},{once:true});
const quiz=[{q:"Gunung meletus mengeluarkan?",a:["Lava panas","Salju","Angin"],c:0},{q:"Saat abu turun kita harus?",a:["Pakai masker","Main","Tidur luar"],c:0},{q:"Saat evakuasi?",a:["Ikuti petugas","Selfie","Lari sendiri"],c:0},{q:"Bolehkah mendekati lava?",a:["Tidak","Boleh","Aman"],c:0},{q:"Yang melindungi pernapasan?",a:["Masker","Topi","Sepatu"],c:0}];
let i=0,score=0,leaderboardSubmitted=false;
async function submitScoreToLeaderboard(){const raw=localStorage.getItem("app_user");if(!raw) return {ok:false,error:"Session user tidak ditemukan. Silakan login ulang."};if(typeof window.saveQuizScore!=="function") return {ok:false,error:"Client Supabase belum siap."};try{const user=JSON.parse(raw);if(!user||!user.id) return {ok:false,error:"Data user tidak valid. Silakan login ulang."};return await window.saveQuizScore(user.id,"gunung_meletus",score,quiz.length);}catch(err){return {ok:false,error:"Session rusak. Silakan login ulang."};}}
async function submitResult(){if(leaderboardSubmitted) return;const submitBtn=document.getElementById("submitBtn");submitBtn.disabled=true;submitBtn.textContent="⏳ Mengirim...";const result=await submitScoreToLeaderboard();if(!result.ok){submitBtn.disabled=false;submitBtn.textContent="📤 Submit Skor";alert(`Gagal submit skor: ${result.error}`);return;}leaderboardSubmitted=true;submitBtn.textContent="✅ Skor Terkirim";submitBtn.disabled=true;document.getElementById("leaderboardBtn").style.display="inline-block";}
function goLeaderboard(){window.location.href="leaderboard.html";}
function typeText(text){let el=document.getElementById("bubble");el.innerHTML="";let n=0;let typing=setInterval(()=>{el.innerHTML+=text.charAt(n);n++;if(n>=text.length) clearInterval(typing);},28);}
function load(){if(i===0){typeText("Halo! Aku Bumi 🌎 Yuk belajar Gunung Meletus!");document.getElementById("earth").innerHTML="🌎🙂";}if(i>=quiz.length){finish();return;}progress.innerHTML="Soal "+(i+1)+" / "+quiz.length;question.innerHTML=quiz[i].q;answers.innerHTML="";quiz[i].a.forEach((p,x)=>{answers.innerHTML+=`<button onclick="check(${x})">${p}</button>`;});}
function check(x){if(x===quiz[i].c){score++;document.getElementById("earth").innerHTML="🌎😊";document.getElementById("benar").play();}else{document.getElementById("earth").innerHTML="🌎😢";document.getElementById("salah").play();}i++;setTimeout(load,600);}
function finish(){question.innerHTML="Skor Kamu "+score+"/"+quiz.length;answers.innerHTML="";progress.innerHTML="";let star=3;if(score<5) star=2;if(score<=2) star=1;stars.innerHTML="⭐".repeat(star);if(score===quiz.length){document.getElementById("earth").innerHTML="🌎😁";typeText("Hebat! Kamu penyelamat bumi!");}else{document.getElementById("earth").innerHTML="🌎🙂";typeText("Bagus! Yuk belajar lagi!");}document.getElementById("restartBtn").style.display="inline-block";document.getElementById("submitBtn").style.display="inline-block";}
function restart(){i=0;score=0;stars.innerHTML="";document.getElementById("earth").innerHTML="🌎🙂";document.getElementById("restartBtn").style.display="none";document.getElementById("submitBtn").style.display="none";document.getElementById("leaderboardBtn").style.display="none";const submitBtn=document.getElementById("submitBtn");submitBtn.textContent="📤 Submit Skor";submitBtn.disabled=false;leaderboardSubmitted=false;load();}
load();
</script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL = 'https://oojidxnmreehgkyawaaa.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vamlkeG5tcmVlaGdreWF3YWFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzQxMDEsImV4cCI6MjA4OTQxMDEwMX0.9VMLifRBhO52A6FopWg1f1-yEnUDpFwSPlvPnj1XtKM';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
window.saveQuizScore = async function(userId, quizCode, scoreValue, totalValue) { const { error } = await supabase.rpc('submit_quiz_score', { p_user_id: userId, p_quiz_code: quizCode, p_score: scoreValue, p_total: totalValue, }); if (error) return { ok:false, error:error.message }; return { ok:true }; };
</script>
<script>(function checkLogin(){const raw=localStorage.getItem('app_user');if(!raw){window.location.href='login.html';}})();</script>
</body>
</html>
