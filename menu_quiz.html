<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pilih Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>

*{ box-sizing:border-box; }

:root{
--ink:#e2e8f0;
--muted:#94a3b8;
--panel:rgba(15,23,42,.78);
--panel-border:rgba(148,163,184,.24);
--card:linear-gradient(160deg,#0f172a,#1e293b);
}

body{
margin:0;
font-family:'Fredoka', sans-serif;
background-image:
linear-gradient(180deg, rgba(2,6,23,.84), rgba(15,23,42,.82)),
url('assets/jpg/bg.jpg');
background-size:cover, cover;
background-position:center, center;
background-repeat:no-repeat, no-repeat;
background-attachment:fixed, fixed;
background-blend-mode:multiply;
overflow-x:hidden;
color:var(--ink);
min-height:100vh;
position:relative;
}

body::before{
content:none;
}

/* ===== TOMBOL KEMBALI ===== */

.back-btn{
position:fixed;
top:16px;
left:16px;
background:rgba(15,23,42,.88);
backdrop-filter:blur(8px);
padding:9px 15px;
border-radius:999px;
text-decoration:none;
color:#e2e8f0;
font-weight:600;
box-shadow:0 12px 26px rgba(2,6,23,.45);
border:1px solid rgba(148,163,184,.24);
transition:transform .2s, box-shadow .2s;
font-size:14px;
z-index:5;
}

.back-btn:hover{
transform:translateY(-2px);
box-shadow:0 16px 30px rgba(2,6,23,.55);
}

/* ===== CONTAINER ===== */

.container{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:80px 20px 34px;
max-width:980px;
margin:auto;
position:relative;
z-index:2;
}

.hero-badge{
display:inline-flex;
align-items:center;
justify-content:center;
padding:7px 14px;
border-radius:999px;
background:linear-gradient(135deg, rgba(56,189,248,.22), rgba(99,102,241,.2));
color:#bae6fd;
font-size:12px;
font-weight:600;
margin-bottom:12px;
border:1px solid rgba(125,211,252,.35);
}

h1{
color:#f8fafc;
font-size:clamp(26px,5vw,38px);
margin:0 0 8px;
}

.subtitle{
color:#cbd5e1;
margin-bottom:26px;
font-size:clamp(14px,3vw,18px);
}

.panel{
width:min(100%, 1050px);
background:var(--panel);
border:1px solid var(--panel-border);
backdrop-filter:blur(10px);
box-shadow:0 24px 45px rgba(2,6,23,.45);
border-radius:26px;
padding:26px;
}

.quiz-grid{
display:grid;
grid-template-columns:repeat(2, minmax(0, 1fr));
gap:16px;
align-items:stretch;
}

/* ===== CARD QUIZ ===== */

.quiz-card{
background:var(--card);
padding:22px 16px;
border-radius:20px;
text-decoration:none;
color:#f8fafc;
box-shadow:0 14px 26px rgba(2,6,23,.4);
border:1px solid rgba(148,163,184,.22);
transition:transform .24s, box-shadow .24s;
width:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:160px;
position:relative;
overflow:hidden;
}

.quiz-card:hover{
transform:translateY(-6px) scale(1.02);
box-shadow:0 18px 34px rgba(2,6,23,.55);
}

.quiz-card::after{
content:"";
position:absolute;
width:88px;
height:88px;
right:-24px;
bottom:-24px;
border-radius:50%;
background:rgba(148,163,184,.2);
}

.quiz-card:nth-child(1){border-top:4px solid #ff7b54;}
.quiz-card:nth-child(2){border-top:4px solid #0077b6;}
.quiz-card:nth-child(3){border-top:4px solid #00a8db;}
.quiz-card:nth-child(4){border-top:4px solid #8d6e63;}
.quiz-card:nth-child(5){border-top:4px solid #eab308;}

.quiz-card:last-child{
grid-column:1 / -1;
max-width:340px;
justify-self:center;
}

/* ICON */

.icon{
width:64px;
height:64px;
display:grid;
place-items:center;
font-size:34px;
margin-bottom:12px;
border-radius:18px;
background:linear-gradient(135deg, rgba(56,189,248,.18), rgba(99,102,241,.2));
box-shadow:inset 0 0 0 1px rgba(148,163,184,.24);
position:relative;
z-index:1;
}

/* TEXT */

.quiz-title{
font-size:18px;
font-weight:600;
line-height:1.25;
position:relative;
z-index:1;
}

/* ===== CLOUD ANIMATION ===== */

.cloud{
position:fixed;
background:white;
border-radius:50px;
opacity:.22;
filter:blur(2px);
z-index:0;
}

.cloud::before,
.cloud::after{
content:'';
position:absolute;
background:white;
border-radius:50%;
}

.cloud2{
width:170px;
height:54px;
top:120px;
left:-220px;
animation:gerakAwan 55s linear infinite;
}

.cloud2::before{
width:70px;
height:70px;
top:-32px;
left:26px;
}

.cloud2::after{
width:86px;
height:86px;
top:-42px;
right:16px;
}

.cloud1{
width:130px;
height:44px;
top:58px;
left:-180px;
animation:gerakAwan 42s linear infinite;
}

.cloud1::before{
width:54px;
height:54px;
top:-24px;
left:20px;
}

.cloud1::after{
width:72px;
height:72px;
top:-34px;
right:14px;
}

@keyframes gerakAwan{
from{ transform:translateX(-200px);}
to{ transform:translateX(120vw);}
}

.ground-wave{
position:fixed;
left:-5%;
right:-5%;
bottom:-110px;
height:220px;
z-index:0;
pointer-events:none;
background:
radial-gradient(circle at 12% 45%, rgba(56,189,248,.14) 0 120px, transparent 121px),
radial-gradient(circle at 34% 58%, rgba(99,102,241,.12) 0 140px, transparent 141px),
radial-gradient(circle at 60% 45%, rgba(56,189,248,.12) 0 130px, transparent 131px),
radial-gradient(circle at 84% 56%, rgba(99,102,241,.1) 0 140px, transparent 141px);
}

/* ===== RESPONSIVE HP ===== */

@media (max-width:768px){

.container{
padding:74px 14px 26px;
min-height:auto;
}

.panel{
padding:20px 14px;
}

.quiz-grid{
grid-template-columns:1fr;
gap:14px;
}

.quiz-card:last-child{
grid-column:auto;
max-width:none;
justify-self:stretch;
}

.quiz-card{
min-height:146px;
}

.icon{
width:58px;
height:58px;
font-size:30px;
}

.quiz-title{
font-size:18px;
}

.back-btn{
top:12px;
left:12px;
font-size:13px;
padding:8px 12px;
}

.ground-wave{
height:170px;
bottom:-90px;
}

}

</style>
</head>
