<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game Banjir</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>

/* ===============================
   RESET
================================= */
* {
    box-sizing: border-box;
}

/* ===============================
   BODY
================================= */
body {
    font-family: Fredoka, sans-serif;
    text-align: center;
    margin: 0;
    min-height: 100vh;
    overflow-x: hidden;
    padding: 20px 16px 28px;
    color: #1e4158;
    position: relative;

    background-image:
        linear-gradient(
            180deg,
            rgba(190,232,255,.78),
            rgba(226,243,255,.9)
        ),
        url('assets/jpg/bg.jpg');

    background-size: cover;
    background-position: center;
}

/* dekorasi background */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: .26;
    z-index: 0;

    background:
        radial-gradient(circle at 18% 18%, white 0 12px, transparent 13px),
        radial-gradient(circle at 82% 24%, white 0 10px, transparent 11px),
        radial-gradient(circle at 24% 74%, white 0 14px, transparent 15px);
}

/* ===============================
   HUJAN
================================= */
.rain {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 1;
}

.drop {
    position: absolute;
    width: 2px;
    height: 18px;
    background: linear-gradient(transparent, rgba(255,255,255,.8));
    animation: fall linear infinite;
}

@keyframes fall {
    from {
        transform: translateY(-100px);
    }
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}

/* ===============================
   HEADER
================================= */
header {
    width: min(100%, 980px);
    margin: auto auto 18px;

    background: linear-gradient(135deg,#2f95d8,#1f6ea8);
    color: white;

    padding: 18px;
    border-radius: 18px;
    font-size: clamp(18px,4vw,24px);
    font-weight: bold;
}

/* ===============================
   BACK BUTTON
================================= */
.back-btn {
    position: fixed;
    top: 18px;
    left: 18px;

    padding: 9px 14px;
    border-radius: 999px;

    background: rgba(255,255,255,.92);
    text-decoration: none;
    color: #1f6ea8;
    font-weight: bold;
}

/* ===============================
   DASHBOARD
================================= */
.dashboard {
    position: relative;
    z-index: 2;

    width: min(100%,980px);
    margin: auto;

    background: rgba(255,255,255,.9);
    border-radius: 28px;
    padding: 26px 20px;
}

/* ===============================
   KARAKTER BUMI
================================= */
.earth {
    font-size: 88px;
    animation: bounce 1.1s infinite alternate;
}

@keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-10px); }
}

/* ===============================
   BUBBLE
================================= */
.bubble {
    background: white;
    padding: 14px 18px;
    border-radius: 20px;
    margin: 16px auto;
    max-width: 680px;
}

/* ===============================
   BUTTON
================================= */
button {
    padding: 12px 18px;
    margin: 8px;

    border: none;
    border-radius: 12px;

    cursor: pointer;
    color: white;
    font-weight: 600;

    background: linear-gradient(135deg,#2f95d8,#1f6ea8);
}

/* ===============================
   RESPONSIVE
================================= */
@media(max-width:600px){
    button{
        width:90%;
        display:block;
        margin:auto;
    }
}

</style>
</head>

<body>

<!-- efek hujan -->
<div class="rain" id="rain"></div>

<header>Game Banjir</header>

<a href="menu_quiz.html" class="back-btn">⬅ Kembali</a>

<!-- AUDIO -->
<audio id="bgm" src="assets/mp3/backsound_quiz.mp3" loop></audio>
<audio id="benar" src="assets/mp3/benar.mp3"></audio>
<audio id="salah" src="assets/mp3/salah.mp3"></audio>

<!-- DASHBOARD -->
<div class="dashboard">

    <div class="earth" id="earth">🌎🙂</div>
    <div class="bubble" id="bubble"></div>

    <h3 id="progress"></h3>
    <h2 id="question"></h2>

    <div id="answers"></div>

    <div id="stars"></div>

    <button id="restartBtn" onclick="restart()" style="display:none;">
        🔁 Main Lagi
    </button>

    <button id="submitBtn" onclick="submitResult()" style="display:none;">
        📤 Submit Skor
    </button>

    <button id="leaderboardBtn" onclick="goLeaderboard()" style="display:none;">
        🏆 Leaderboard
    </button>

</div>

<script>

/* ======================================
   DOM
====================================== */
const bgm = document.getElementById("bgm");
const earth = document.getElementById("earth");
const bubble = document.getElementById("bubble");
const progress = document.getElementById("progress");
const question = document.getElementById("question");
const answers = document.getElementById("answers");
const stars = document.getElementById("stars");

/* ======================================
   DATA QUIZ
====================================== */
const quiz = [
    {
        q: "Banjir terjadi karena?",
        a: ["Hujan deras","Salju","Kabut"],
        c: 0
    },
    {
        q: "Air banjir itu?",
        a: ["Berbahaya","Aman","Bersih"],
        c: 0
    },
    {
        q: "Saat banjir kita?",
        a: ["Ke tempat tinggi","Main air","Berenang"],
        c: 0
    },
    {
        q: "Listrik saat banjir?",
        a: ["Dimatikan","Dinyalakan","Tidak apa"],
        c: 0
    },
    {
        q: "Boleh bermain banjir?",
        a: ["Tidak boleh","Boleh","Harus"],
        c: 0
    }
];

/* ======================================
   STATE
====================================== */
let index = 0;
let score = 0;

/* ======================================
   AUDIO AUTOPLAY
====================================== */
document.body.addEventListener("click", () => {
    bgm.play();
}, { once:true });

/* ======================================
   EFEK HUJAN
====================================== */
function createRain(){
    const rain = document.getElementById("rain");

    for(let i=0;i<120;i++){
        const drop = document.createElement("div");

        drop.className = "drop";
        drop.style.left = Math.random()*100+"%";
        drop.style.animationDuration = (0.4+Math.random())+"s";

        rain.appendChild(drop);
    }
}
createRain();

/* ======================================
   TYPING TEXT
====================================== */
function typeText(text){
    bubble.textContent = "";
    let i = 0;

    const timer = setInterval(()=>{
        bubble.textContent += text[i];
        i++;

        if(i>=text.length){
            clearInterval(timer);
        }
    },28);
}

/* ======================================
   LOAD SOAL
====================================== */
function load(){

    if(index >= quiz.length){
        finish();
        return;
    }

    const current = quiz[index];

    progress.textContent =
        `Soal ${index+1}/${quiz.length}`;

    question.textContent = current.q;

    answers.innerHTML = "";

    current.a.forEach((jawaban,i)=>{
        answers.innerHTML +=
        `<button onclick="check(${i})">${jawaban}</button>`;
    });
}

/* ======================================
   CEK JAWABAN
====================================== */
function check(answer){

    if(answer === quiz[index].c){
        score++;
        earth.textContent = "🌎😊";
        benar.play();
    } else {
        earth.textContent = "🌎😢";
        salah.play();
    }

    index++;

    setTimeout(load,600);
}

/* ======================================
   FINISH
====================================== */
function finish(){

    question.textContent =
        `Skor Kamu ${score}/${quiz.length}`;

    answers.innerHTML = "";
    progress.textContent = "";

    stars.textContent =
        "⭐".repeat(
            score === 5 ? 3 :
            score >=3 ? 2 : 1
        );

    typeText(
        score === 5
        ? "Hebat! Kamu paham banjir!"
        : "Bagus, ayo belajar lagi!"
    );

    restartBtn.style.display = "inline-block";
    submitBtn.style.display = "inline-block";
}

/* ======================================
   RESTART
====================================== */
function restart(){
    index = 0;
    score = 0;
    stars.textContent = "";
    load();
}

/* ======================================
   LEADERBOARD
====================================== */
function goLeaderboard(){
    location.href = "leaderboard.html";
}

/* ======================================
   START
====================================== */
typeText("Halo! Aku Bumi 🌎 Yuk belajar banjir!");
load();

</script>

</body>
</html>
