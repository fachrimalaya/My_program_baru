<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Banjir</title>
<style>
*{box-sizing:border-box;}
body{font-family:Fredoka,sans-serif;text-align:center;margin:0;overflow-x:hidden;min-height:100vh;padding:20px 16px 28px;background-image:linear-gradient(180deg, rgba(198,232,255,.82), rgba(227,243,255,.9)), url('assets/jpg/bg.jpg');background-size:cover, cover;background-position:center, center;background-repeat:no-repeat, no-repeat;background-blend-mode:soft-light;animation:gradientBG 16s ease infinite;color:#163447;position:relative;}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.28;background:radial-gradient(circle at 12% 20%, rgba(255,255,255,.95) 0 12px, transparent 13px),radial-gradient(circle at 82% 18%, rgba(255,255,255,.9) 0 10px, transparent 11px),radial-gradient(circle at 25% 72%, rgba(255,255,255,.82) 0 14px, transparent 15px);}
body::after{content:"";position:fixed;inset:auto -5% -6% -5%;height:260px;pointer-events:none;z-index:0;background:radial-gradient(circle at 15% 35%, rgba(59,130,246,.22), transparent 26%),radial-gradient(circle at 32% 58%, rgba(34,197,94,.18), transparent 28%),radial-gradient(circle at 52% 42%, rgba(59,130,246,.18), transparent 24%),radial-gradient(circle at 72% 64%, rgba(14,165,233,.2), transparent 26%),radial-gradient(circle at 88% 38%, rgba(34,197,94,.18), transparent 24%);opacity:.95;}
@keyframes gradientBG{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.rain{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:0;}
.drop{position:absolute;width:2px;height:18px;background:linear-gradient(transparent,rgba(255,255,255,.8));animation:fall linear infinite;opacity:.8;}
@keyframes fall{0%{transform:translateY(-100px);opacity:1;}100%{transform:translateY(100vh);opacity:0;}}
header{background:linear-gradient(135deg,#1f5f8b,#184764);color:#fff;padding:18px 16px;font-size:clamp(18px,4vw,24px);font-weight:bold;border-radius:18px;box-shadow:0 12px 28px rgba(24,71,100,.22);position:relative;z-index:2;width:min(100%,980px);margin:0 auto 18px;}
.back-btn{position:fixed;top:18px;left:18px;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);padding:9px 14px;border-radius:999px;text-decoration:none;font-weight:bold;color:#184764;box-shadow:0 10px 24px rgba(24,71,100,.12);border:1px solid rgba(255,255,255,.8);font-size:14px;z-index:3;}
.back-btn:hover{transform:translateY(-2px);}
.dashboard{position:relative;z-index:2;width:min(100%,980px);margin:0 auto;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.75);border-radius:28px;box-shadow:0 18px 40px rgba(24,71,100,.14);padding:26px 20px 22px;}
.dashboard-top{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:16px;}
.earth{font-size:88px;animation:bounce 1.1s infinite alternate;line-height:1;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-10px);}}
.bubble{background:rgba(255,255,255,.92);backdrop-filter:blur(10px);padding:14px 18px;border-radius:20px;display:inline-block;margin:0 auto 16px;box-shadow:0 10px 20px rgba(24,71,100,.12);min-height:48px;max-width:min(100%,680px);border:1px solid rgba(214,228,240,.95);color:#163447;}
#progress{color:#5e7687;margin:14px 0 6px;font-size:14px;}
#question{color:#163447;margin:0 auto 12px;font-size:clamp(20px,3.2vw,28px);max-width:900px;padding:0 10px;}
#answers{max-width:900px;margin:0 auto;}
#result{color:#184764;margin-top:16px;font-size:clamp(22px,4vw,30px);}
#stars{margin:8px 0 12px;}
.star{font-size:35px;color:gold;}
button{padding:12px 18px;margin:8px;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,#1f5f8b,#184764);color:#fff;font-weight:600;transition:.2s;box-shadow:0 10px 18px rgba(24,71,100,.12);}
button:hover{transform:translateY(-2px);box-shadow:0 14px 22px rgba(24,71,100,.18);}
button:disabled{opacity:.75;cursor:not-allowed;transform:none;}
@media (max-width:600px){body{padding:16px 12px 24px;}header{margin-top:38px;padding:14px 12px;}.back-btn{top:12px;left:12px;font-size:13px;padding:7px 11px;}.dashboard{padding:20px 14px 18px;border-radius:22px;}.earth{font-size:70px;}.bubble{margin:0 auto 12px;width:100%;}button{width:90%;max-width:280px;display:block;margin:10px auto;}#question{font-size:20px;padding:0 6px;}#result{font-size:22px;}.star{font-size:30px;}}
</style>
</head>
<body>
<div class="rain" id="rain"></div>
<header>Game Banjir</header>
<a href="menu_quiz.html" class="back-btn">&#x2B05; Kembali</a>
<audio id="bgm" src="assets/mp3/backsound_quiz.mp3" loop></audio>
<audio id="benar" src="assets/mp3/benar.mp3"></audio>
<audio id="salah" src="assets/mp3/salah.mp3"></audio>
<div class="dashboard">
  <div class="dashboard-top">
    <div class="earth" id="earth">&#x1F30E;&#x1F642;</div>
    <div class="bubble" id="bubble"></div>
  </div>
  <h3 id="progress"></h3>
  <h2 id="question"></h2>
  <div id="answers"></div>
  <h2 id="result"></h2>
  <div id="stars"></div>
  <button id="restartBtn" onclick="restart()" style="display:none;">&#x1F501; Main Lagi</button>
  <button id="submitBtn" onclick="submitResult()" style="display:none;">&#x1F4E4; Submit Skor</button>
  <button id="leaderboardBtn" onclick="goLeaderboard()" style="display:none;">&#x1F3C6; Lihat Leaderboard</button>
</div>
<script>
document.body.addEventListener("click",()=>{document.getElementById("bgm").play();},{once:true});
const rain=document.getElementById("rain");
for(let i=0;i<120;i++){let drop=document.createElement("div");drop.className="drop";drop.style.left=Math.random()*100+"%";drop.style.animationDuration=(0.4+Math.random()*0.6)+"s";drop.style.animationDelay=Math.random()*2+"s";drop.style.height=(12+Math.random()*15)+"px";rain.appendChild(drop);}
const quiz=[{q:"Banjir terjadi karena?",a:["Hujan deras","Salju","Kabut"],c:0},{q:"Air banjir itu?",a:["Berbahaya","Aman","Bersih"],c:0},{q:"Saat banjir kita?",a:["Ke tempat tinggi","Main air","Berenang"],c:0},{q:"Listrik saat banjir?",a:["Dimatikan","Dinyalakan","Tidak apa"],c:0},{q:"Boleh bermain banjir?",a:["Tidak boleh","Boleh","Harus"],c:0}];
let i=0,score=0,leaderboardSubmitted=false;
async function submitScoreToLeaderboard(){const raw=localStorage.getItem("app_user");if(!raw) return {ok:false,error:"Session user tidak ditemukan. Silakan login ulang."};if(typeof window.saveQuizScore!=="function") return {ok:false,error:"Client Supabase belum siap."};try{const user=JSON.parse(raw);if(!user||!user.id) return {ok:false,error:"Data user tidak valid. Silakan login ulang."};return await window.saveQuizScore(user.id,"banjir",score,quiz.length);}catch(err){return {ok:false,error:"Session rusak. Silakan login ulang."};}}
async function submitResult(){if(leaderboardSubmitted) return;const submitBtn=document.getElementById("submitBtn");submitBtn.disabled=true;submitBtn.textContent="\u23F3 Mengirim...";const result=await submitScoreToLeaderboard();if(!result.ok){submitBtn.disabled=false;submitBtn.textContent="\u{1F4E4} Submit Skor";alert(`Gagal submit skor: ${result.error}`);return;}leaderboardSubmitted=true;submitBtn.textContent="\u2705 Skor Terkirim";submitBtn.disabled=true;document.getElementById("leaderboardBtn").style.display="inline-block";}
function goLeaderboard(){window.location.href="leaderboard.html";}
function typeText(text){let el=document.getElementById("bubble");el.textContent="";let n=0;let typing=setInterval(()=>{el.textContent+=text.charAt(n);n++;if(n>=text.length) clearInterval(typing);},28);}
function load(){if(i===0){typeText("Halo! Aku Bumi \u{1F30E} Yuk belajar tentang Banjir!");document.getElementById("earth").textContent="\u{1F30E}\u{1F642}";}if(i>=quiz.length){finish();return;}progress.textContent="Soal "+(i+1)+" / "+quiz.length;question.textContent=quiz[i].q;answers.innerHTML="";quiz[i].a.forEach((p,x)=>{answers.innerHTML+=`<button onclick="check(${x})">${p}</button>`;});}
function check(x){if(x===quiz[i].c){score++;document.getElementById("earth").textContent="\u{1F30E}\u{1F60A}";document.getElementById("benar").play();}else{document.getElementById("earth").textContent="\u{1F30E}\u{1F622}";document.getElementById("salah").play();}i++;setTimeout(load,600);}
function finish(){question.textContent="Skor Kamu "+score+"/"+quiz.length;answers.innerHTML="";progress.textContent="";let star=3;if(score<5) star=2;if(score<=2) star=1;stars.textContent="\u2B50".repeat(star);if(score===quiz.length){document.getElementById("earth").textContent="\u{1F30E}\u{1F601}";typeText("Hebat! Kamu tahu cara aman saat banjir!");}else{document.getElementById("earth").textContent="\u{1F30E}\u{1F642}";typeText("Bagus! Yuk belajar lagi agar lebih siap!");}document.getElementById("restartBtn").style.display="inline-block";document.getElementById("submitBtn").style.display="inline-block";}
function restart(){i=0;score=0;stars.textContent="";document.getElementById("earth").textContent="\u{1F30E}\u{1F642}";document.getElementById("restartBtn").style.display="none";document.getElementById("submitBtn").style.display="none";document.getElementById("leaderboardBtn").style.display="none";const submitBtn=document.getElementById("submitBtn");submitBtn.textContent="\u{1F4E4} Submit Skor";submitBtn.disabled=false;leaderboardSubmitted=false;load();}
load();
</script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL = 'https://oojidxnmreehgkyawaaa.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vamlkeG5tcmVlaGdreWF3YWFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzQxMDEsImV4cCI6MjA4OTQxMDEwMX0.9VMLifRBhO52A6FopWg1f1-yEnUDpFwSPlvPnj1XtKM';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
window.saveQuizScore = async function(userId, quizCode, scoreValue, totalValue) { const { error } = await supabase.rpc('submit_quiz_score', { p_user_id: userId, p_quiz_code: quizCode, p_score: scoreValue, p_total: totalValue, }); if (error) return { ok:false, error:error.message }; return { ok:true }; };
</script>
<script>(function checkLogin(){const raw=localStorage.getItem('app_user');if(!raw){window.location.href='login.html';}})();</script>
</body>
</html>
