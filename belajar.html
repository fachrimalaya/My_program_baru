<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materi Belajar - Edukasi Bencana</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>

*{ box-sizing:border-box; }

:root{
--sky-1:#c7e4f4;
--sky-2:#9ac7dd;
--sky-3:#2f6f8e;
--sky-4:#1e4a63;
--card:#ffffff;
}

/* ================= BODY ================= */
body{
font-family:Fredoka, sans-serif;
margin:0;
overflow-x:hidden;

background: linear-gradient(-45deg, var(--sky-1), #e6f3fa, #d4eaf5, #f6fbfe, var(--sky-2));
background-size: 420% 420%;
animation: gradientBG 14s ease infinite;

text-align:center;
}

body::before{
content:"";
position:fixed;
inset:0;
z-index:-2;
pointer-events:none;
opacity:.2;
background:repeating-linear-gradient(
120deg,
rgba(255,255,255,.5) 0 15px,
rgba(255,255,255,0) 15px 40px
);
}

@keyframes gradientBG {
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* ================= CLOUD ================= */
.cloud{
position:absolute;
background:white;
border-radius:50px;
opacity:.55;
filter:blur(2px);
z-index:0;
}

.cloud::before,
.cloud::after{
content:'';
position:absolute;
background:white;
border-radius:50%;
}

.cloud1{
width:120px; height:40px;
top:80px;
left:-150px;
animation:cloudMove 40s linear infinite;
}

.cloud1::before{
width:50px; height:50px;
top:-25px; left:20px;
}

.cloud1::after{
width:70px; height:70px;
top:-35px; right:15px;
}

.cloud2{
width:160px; height:50px;
top:200px;
left:-200px;
animation:cloudMove 55s linear infinite;
}

.blob{
position:fixed;
border-radius:50%;
filter:blur(2px);
pointer-events:none;
z-index:0;
opacity:.35;
}

.blob1{
width:230px;
height:230px;
left:-60px;
top:180px;
background:radial-gradient(circle, rgba(196,146,92,.26), rgba(196,146,92,0) 70%);
animation:blobFloat 10s ease-in-out infinite;
}

.blob2{
width:280px;
height:280px;
right:-70px;
bottom:70px;
background:radial-gradient(circle, rgba(94,136,154,.24), rgba(94,136,154,0) 70%);
animation:blobFloat 13s ease-in-out infinite reverse;
}

@keyframes blobFloat{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-14px);}
}

@keyframes cloudMove{
0%{transform:translateX(0);}
100%{transform:translateX(130vw);}
}

/* ================= PARTICLE ================= */
.particle{
position:absolute;
width:6px;
height:6px;
background:#ffffff;
border-radius:50%;
opacity:.4;
animation:floatParticle 8s linear infinite;
z-index:0;
}

@keyframes floatParticle{
0%{transform:translateY(0) scale(1);}
100%{transform:translateY(-100vh) scale(0);}
}

/* ================= HEADER ================= */
header{
background:linear-gradient(120deg, var(--sky-3), var(--sky-4));
color:white;
padding:18px;
font-size:clamp(18px,4vw,26px);
font-weight:bold;
position:relative;
z-index:2;
box-shadow:0 10px 24px rgba(30,74,99,.24);
}

header h1{
margin:0;
}

/* ================= CONTAINER ================= */
.container{
max-width:1000px;
margin:auto;
padding:26px 16px 36px;
position:relative;
z-index:2;
}

.card{
background:rgba(255,255,255,.88);
padding:26px;
border-radius:24px;
box-shadow:0 14px 32px rgba(31,75,100,.14);
border:1px solid rgba(255,255,255,.65);
backdrop-filter:blur(10px);
}

/* ================= HOST ================= */

.host-wrapper{
margin-bottom:30px;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

.earth-host{
width:160px;
height:160px;
margin:auto;
border-radius:50%;
background:radial-gradient(circle at 35% 35%, #8ec6df, #2f6f8e);
position:relative;
box-shadow:0 12px 25px rgba(0,0,0,.25);
animation:float 3s ease-in-out infinite;
}

.face{
position:absolute;
top:50px;
left:0;
right:0;
}

.eye{
width:18px;
height:18px;
background:white;
border-radius:50%;
position:absolute;
animation:blink 5s infinite;
}

.eye.left{ left:45px;}
.eye.right{ right:45px;}

@keyframes blink{
0%,92%,100%{transform:scaleY(1);}
95%{transform:scaleY(0.1);}
}

.mouth{
width:45px;
height:22px;
border-bottom:4px solid white;
border-radius:0 0 40px 40px;
margin:25px auto;
transition:.2s;
}

.talking{
height:12px;
background:white;
border:none;
border-radius:10px;
}

/* tangan */
.hand{
width:24px;
height:60px;
background:#8ec6df;
position:absolute;
top:60px;
border-radius:20px;
}

.left-hand{
left:-22px;
animation:wave 2s infinite;
}

.right-hand{
right:-22px;
}

@keyframes wave{
0%{transform:rotate(0deg);}
50%{transform:rotate(-30deg);}
100%{transform:rotate(0deg);}
}

/* chat bubble */
.bubble{
background:rgba(255,255,255,.95);
padding:14px 22px;
border-radius:24px;
display:inline-block;
margin-top:15px;
box-shadow:0 5px 12px rgba(0,0,0,.2);
min-height:40px;
font-size:clamp(14px,3vw,18px);
max-width:90%;
line-height:1.5;
}

/* ================= MENU ================= */

.menu{
display:grid;
grid-template-columns:repeat(2, minmax(160px, 1fr));
gap:16px;
margin-top:30px;
width:100%;
}

.menu-btn{
padding:18px 16px 16px;
border-radius:20px;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.3s;
box-shadow:0 10px 18px rgba(0,0,0,.16);
text-decoration:none;
display:block;
min-height:132px;
position:relative;
overflow:hidden;
box-sizing:border-box;
}

.menu-btn:hover{
transform:translateY(-7px) scale(1.03);
}

.menu-btn::after{
content:"";
position:absolute;
width:100px;
height:100px;
right:-30px;
bottom:-30px;
border-radius:50%;
background:rgba(255,255,255,.16);
}

.menu-icon{
width:52px;
height:52px;
margin:0 auto 10px;
border-radius:16px;
display:grid;
place-items:center;
font-size:28px;
background:rgba(255,255,255,.22);
box-shadow:inset 0 1px 0 rgba(255,255,255,.25);
}

.menu-title{
display:block;
font-size:20px;
line-height:1.1;
}

.menu-desc{
display:block;
margin-top:6px;
font-size:13px;
font-weight:600;
opacity:.94;
}

.logout-btn{
position:fixed;
top:14px;
left:14px;
padding:8px 14px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.94);
color:#1f2937;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.2);
z-index:5;
backdrop-filter:blur(8px);
}

.logout-btn:hover{
transform:scale(1.05);
}

/* warna tombol */
.gunung{ background:linear-gradient(135deg, #ff7b54, #f35b04); }
.tsunami{ background:linear-gradient(135deg, #0077b6, #023e8a); }
.banjir{ background:linear-gradient(135deg, #00a8db, #0077b6); }
.gempa{ background:linear-gradient(135deg, #a1887f, #8d6e63); }

/* ================= RESPONSIVE ================= */

@media (max-width:768px){

.container{ padding:16px 10px 26px; }
.card{ padding:16px 12px; }

.earth-host{
width:120px;
height:120px;
}

.eye.left{ left:30px;}
.eye.right{ right:30px;}

.menu{ grid-template-columns:1fr; }

.menu-btn{
width:100%;
font-size:17px;
padding:16px 14px 14px;
min-height:120px;
}

.menu-icon{
width:46px;
height:46px;
font-size:24px;
}

.menu-title{
font-size:18px;
}

.menu-desc{
font-size:12px;
}

}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-14px);}
}
</style>
</head>

<body>

<audio id="backsound" loop>
    <source src="assets/mp3/audio1.mp3" type="audio/mpeg">
</audio>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="host-wrapper">
<div class="earth-host">
<div class="face">
<div class="eye left"></div>
<div class="eye right"></div>
<div class="mouth"></div>
</div>
<div class="hand left-hand"></div>
<div class="hand right-hand"></div>
</div>

<!-- BUBBLE TEXT -->
<div class="bubble" id="bubble"></div>
</div>

<header>
<h1>📚 Materi Pembelajaran</h1>
</header>

<div class="container">
<div class="card">
<div class="menu">
<a href="Gunung_Meletus.html" class="menu-btn gunung">
<div class="menu-icon">🌋</div>
<span class="menu-title">Gunung Meletus</span>
<span class="menu-desc">Erupsi Magma</span>
</a>

<a href="Tsunami.html" class="menu-btn tsunami">
<div class="menu-icon">🌊</div>
<span class="menu-title">Tsunami</span>
<span class="menu-desc">Gelombang Besar</span>
</a>

<a href="Banjir.html" class="menu-btn banjir">
<div class="menu-icon">💧</div>
<span class="menu-title">Banjir</span>
<span class="menu-desc">Genangan Air</span>
</a>

<a href="gempa_Bumi.html" class="menu-btn gempa">
<div class="menu-icon">📍</div>
<span class="menu-title">Gempa Bumi</span>
<span class="menu-desc">Getaran Tanah</span>
</a>

</div>
</div>
</div>

<button class="logout-btn" onclick="window.location.href='index.html'">← Kembali</button>

<button id="musicBtn">🎵 Musik OFF</button>

<script>
// ===== TYPING EFFECT =====
const text = "Yuk belajar mengenai bencana alam! 📚";
let i = 0;
const speed = 50;
const bubble = document.getElementById("bubble");

function typeText(){
    if(i < text.length){
        bubble.innerHTML += text.charAt(i);
        i++;
        setTimeout(typeText, speed);
    }
}
typeText();
</script>

<script>
// MUSIC
const audio = document.getElementById("backsound");
const btn = document.getElementById("musicBtn");

document.addEventListener("click", function () {
    audio.play();
}, { once:true });

btn.addEventListener("click", () => {
    if(audio.paused){
        audio.play();
        btn.textContent = "🔊 Musik ON";
    } else {
        audio.pause();
        btn.textContent = "🔇 Musik OFF";
    }
});
</script>

<script>
(function checkLogin() {
    const raw = localStorage.getItem('app_user');
    if (!raw) {
        window.location.href = 'login.html';
    }
})();
</script>

</body>
</html>
