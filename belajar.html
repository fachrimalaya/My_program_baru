<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edukasi Bencana Alam Anak</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Fredoka', sans-serif;
}

body{
background: linear-gradient(180deg,#a0e9ff,#ffffff);
overflow-x:hidden;
}

/* HEADER */
header{
text-align:center;
padding:40px 20px;
color:#fff;
background:linear-gradient(45deg,#00b4ff,#4facfe);
animation:fadeDown 1s ease;
position:relative;
}

header h1{
font-size:clamp(24px,5vw,40px);
}

header p{
margin-top:10px;
font-size:clamp(14px,3vw,18px);
}

/* BUMI */
.earth-host{
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
margin:40px auto 0;
width:160px;
height:160px;
border-radius:50%;
background:radial-gradient(circle at 35% 35%, #4cc9f0, #0077b6);
position:relative;
box-shadow:0 12px 25px rgba(0,0,0,.25);
animation:float 3s ease-in-out infinite;
}

.face{
position:absolute;
top:50px;
left:0;
right:0;
}

.eye{
width:18px;
height:18px;
background:white;
border-radius:50%;
position:absolute;
animation:blink 5s infinite;
}

.eye.left{ left:45px;}
.eye.right{ right:45px;}

@keyframes blink{
0%,92%,100%{transform:scaleY(1);}
95%{transform:scaleY(0.1);}
}

.mouth{
width:45px;
height:22px;
border-bottom:4px solid white;
border-radius:0 0 40px 40px;
margin:25px auto;
}

.hand{
width:24px;
height:60px;
background:#4cc9f0;
position:absolute;
top:60px;
border-radius:20px;
}

.left-hand{
left:-22px;
animation:wave 2s infinite;
}

.right-hand{
right:-22px;
}

@keyframes wave{
0%{transform:rotate(0deg);}
50%{transform:rotate(-30deg);}
100%{transform:rotate(0deg);}
}

/* BUBBLE */
.bubble{
background:white;
padding:14px 22px;
border-radius:25px;
display:block;
width:fit-content;
margin:20px auto 30px;
box-shadow:0 5px 12px rgba(0,0,0,.2);
text-align:center;
font-size:16px;
min-height:40px;
}

/* CARD */
.container{
padding:40px 20px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
}

.card{
background:#fff;
width:260px;
border-radius:20px;
padding:20px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
transition:0.4s;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
}

.card img{
width:100px;
margin-bottom:15px;
}

.card h3{
color:#ff7b00;
}

.btn{
display:inline-block;
padding:10px 18px;
background:#ffb703;
border-radius:20px;
text-decoration:none;
color:#fff;
font-weight:bold;
}

.btn:hover{
background:#fb8500;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:#4facfe;
color:white;
margin-top:40px;
}

/* BUTTON */
#musicBtn{
position:fixed;
bottom:20px;
right:20px;
padding:12px 18px;
border:none;
border-radius:30px;
background:#ffb703;
color:white;
cursor:pointer;
}

.back-btn{
position:absolute;
top:20px;
left:20px;
background:white;
color:#0077b6;
padding:8px 15px;
border-radius:25px;
text-decoration:none;
}

/* ANIMATION */
@keyframes fadeDown{
from{opacity:0; transform:translateY(-40px);}
to{opacity:1;}
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-14px);}
}
</style>
</head>

<body>

<audio id="backsound" loop>
    <source src="assets/mp3/audio1.mp3" type="audio/mpeg">
</audio>

<div class="earth-host">
<div class="face">
<div class="eye left"></div>
<div class="eye right"></div>
<div class="mouth"></div>
</div>
<div class="hand left-hand"></div>
<div class="hand right-hand"></div>
</div>

<!-- BUBBLE TEXT -->
<div class="bubble" id="bubble"></div>

<header>
<a href="index.html" class="back-btn">⬅ Keluar</a>
<h1>🌎 Edukasi Bencana Alam</h1>
<p>Belajar Aman dari Bencana dengan Cara Seru!</p>
</header>

<section class="container">

    <div class="card">
        <img src="assets/jpg/gn_meletus.jpg" onerror="this.src='https://via.placeholder.com/100'">
        <h3>Gunung Meletus</h3>
        <a href="Gunung_Meletus.html" class="btn">Belajar</a>
    </div>

    <div class="card">
        <img src="assets/jpg/tsunami.jpg" onerror="this.src='https://via.placeholder.com/100'">
        <h3>Tsunami</h3>
        <a href="Tsunami.html" class="btn">Belajar</a>
    </div>

    <div class="card">
        <img src="assets/jpg/banjir.jpg" onerror="this.src='https://via.placeholder.com/100'">
        <h3>Banjir</h3>
        <a href="Banjir.html" class="btn">Belajar</a>
    </div>

    <div class="card">
        <img src="assets/jpg/gempa.jpg" onerror="this.src='https://via.placeholder.com/100'">
        <h3>Gempa Bumi</h3>
        <a href="gempa_Bumi.html" class="btn">Belajar</a>
    </div>

</section>

<footer>
<p>© 2026 Website Edukasi Bencana Alam | Fachri Malaya ✨</p>
</footer>

<button id="musicBtn">🎵 Musik OFF</button>

<script>
// ===== TYPING EFFECT =====
const text = "Halo teman! Yuk belajar bencana alam! 🌎";
let i = 0;
const speed = 50;
const bubble = document.getElementById("bubble");

function typing(){
    if(i < text.length){
        bubble.innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, speed);
    }
}
typing();
</script>

<script>
// MUSIC
const audio = document.getElementById("backsound");
const btn = document.getElementById("musicBtn");

document.addEventListener("click", function () {
    audio.play();
}, { once:true });

btn.addEventListener("click", () => {
    if(audio.paused){
        audio.play();
        btn.textContent = "🔊 Musik ON";
    } else {
        audio.pause();
        btn.textContent = "🔇 Musik OFF";
    }
});
</script>

<script>
(function checkLogin() {
    const raw = localStorage.getItem('app_user');
    if (!raw) {
        window.location.href = 'login.html';
    }
})();
</script>

</body>
</html>
